body:
  text: 嗣法門人真解等編法語示霞章禪人即雪住參禪學道惟須鐵石心腸訪友尋師務要英靈氣宇才聞舉著直下承當方稱拔萃男兒便入師子群隊若具這般決烈奚愁道眼不明天龍不衛若夫因循歲月恣縱情懷不透聲色牢關罔省佛祖至要法門何補後學誰歸況爾相侍巾瓶草有餘載歷艱難而匪變守寂寞而不移若非根器廣大願力弘深焉能有此至堅至固不退不轉雖然要將本有之真精勤決擇不無之妙勇鋭參持提起金剛劍劃斷狐疑網根塵盡淨渣滓不留境界不空而空心花不燦而燦到者裏滿空至寶信手隨拈遍界奇珍當機任取更無第二人不落第二見豈不是鐵石心腸英靈氣宇之衲僧也示大破禪人剃髮為僧靈光遮障不得依師學道本分圓通始成而今祖庭秋晚法道寂寥出家者不為生死學道者不須見性一味貪圖名利鼓弄是非徒衒雌雄豈不痛哉若我大破禪人信心脫俗決志披緇侍從山僧相求是道今不審披緇之深淺且問學道之端的莫是寫水塗山是莫是修竹譜花是莫是圍碁撫琴是莫是焚香展卷是若道一切處是則觸若道一切處不是則背試問破禪人觸背俱皆不是且道道在甚麼處於此脫然省去不惟不障靈光亦且發明本分到者裏則剃髮為僧依師學道豈徒然哉示元素禪人元素禪人楚人也髫齡剃髮方外有年草鞋頻破白雲竹杖幾擔明月冰霜歷遍雨雪經餘雖然未審行腳眼明否如是則不負登山涉水訪友尋師不然須向草鞋根底竹杖頭邊密密諦審審到路途窮處雲水斷時元來高矮雲山短長路徑總是一個行腳眼脫或不爾更聽偈言草鞋竹杖叩諸方度水穿雲歲月長直下了明行腳眼從教何處不風光示懋猷張居士去來無相非想相以能知動靜無心豈色心而能見見而無見運用無窮知而無知施為不盡是知性等虛空體同法界但得一念正真自然隨處作主先哲云處處真處處真塵塵盡是本來人今時參而未學而未成者蓋為罔識根源不明旨趣既值知識豈曰小補應須立決烈志啓殊勝懷將無相無心微旨透明始得一生事辦示田善人妙道本不涉言涉言早已差錯欲識妙道根源看取行住坐臥行看是誰牽動住看是誰安止坐看是誰主張臥看是誰夢寐看來看去看到無可看處焂忽冷灰豆爆原來粥飯是米叉鐶即金到者裏則行亦道住亦道坐亦道臥亦道乃至語默動靜喜怒哀樂無不是道會麼劈破上頭關捩子縱橫十字更由誰示陳自新塵內佛火裏蓮直須當陽覷破鏡中花水底月何妨信手拈來如是則在俗無妨居塵不礙不然直須把定繩頭向一切事上參究參到無可參處驀地一聲長嘯萬慮咸清方知塵內佛火裏蓮鏡中花水底月原來不出者裏贈最良李居士學是悟之師悟乃學之祖有學無悟謂之增上慢有悟無學謂之擔板漢是知學必假悟以透悟必借學以資譬如鳥無羽詎可得而飛魚無江安可得而遊所以今日去聖時遙有一等學道人未遇宗眼將文字喚作葛藤見地才是真實殊不知文字中淵源莫測豈可易窺其涯涘哉若於文字識得根腳則文字何異於見地見地何殊於文字故山僧接人更無別法直教隨其所著而領會之也尼父乃云以我為隱乎吾無隱乎爾此理也矣楞嚴云十方薄伽梵一路涅槃門此理也矣華嚴云佛法世間法若見其真實一切無差別亦此理也矣上古淑哲未有不在頭頭上明物物上顯又何嘗取捨執定一邊是知在真宗師手裏出來的自不被境鼓動世念礙他如空中煙雲周旋無礙誰能擬測哉若我最良居士鶚薦辛丑學習淵深雖居富貴不被富貴所欺撞遇燕伯辣手當陽劈破頂門直下知眉在額出言吐氣不即文字不離文字性天朗耀義海澄清且逋名緑野獨立超然豈減子瞻之風似公之若是者有幾雖然者段因緣阿誰欠少總之錯認方便妄執得失因而不能作透網金鱗山僧與公為莫逆友者久矣素羡公雅度欽公逸致真可謂學悟圓通之丈夫特書法語以贈胡心學持金剛經求語過去心不可得現在心不可得未來心不可得三心既不可得且道持經的是那一心如其會得則風動水流盡談般若花吟鳥笑悉演摩訶不然須向三心不可得處看去示清修熊居士喫飯穿衣頭頭合道透得過來本無兩竅是知念佛無非此竅參禪無非此竅此竅若通則佛不念而一切皆佛禪不參而一切皆禪不然念佛則被佛礙參禪則被禪礙會麼若能通此竅無處不皆真與君山劉茂才讀書人弗向宗乘中留心者盡謂宗乘空寂一味釘樁搖櫓才聞宗乘極則便云無可把捉殊不知者無可把捉的乃三世能仁命脈歷代開士元辰故經云依無住本立一切法又云應無所住而生其心若夫神心穎悟見越常情一道虛融萬緣絶待則揮毫展卷不離無住大旨究古窮今亦不離無住大旨甚至焚香煮茗修竹譜花一切種種總不離無住大旨若離無住大旨別尋至要是猶掘地覓天撥波求火山僧結制鎮西始識君山居士讀書不為書縛處世不為世羈有脫塵離俗之風依山傍水之志不似釘樁搖櫓輩執著一邊與山僧盤桓箇事焂忽兩載因而分袂固以無可把捉的信筆而為之記示綿綿禪人綿綿禪人擔當上首氣宇孤清形蹤磊落不親權貴固守寂寥驅寒暑半肩毳衲度歲月一鉢松花可謂忌身忌世不售不酬山僧寓滇之陽瓜而綿不時請益因詰其名號綿曰名廣瓜號綿綿擔當先師所命也一日出紙求語山僧顧而謂曰是求學禪道語脫生死語欲求禪道禪道在汝目前欲脫生死生死在汝腳下於此脫然省去則山僧未搦管時早已書竟脫或未能更聽偈言羡爾精勤廣植園園中瓜已結綿綿甜的徹蒂甜如密苦者和根苦似連莫把甜的喚作苦休將苦者認為甜直須一一親嘗過免得遭他當面瞞示心安禪者春晴無事策杖遊月波菴菴前水湛如藍庭際花開似錦出谷黃鸝翩翩度柳尋巢紫燕剪剪飛梁正顧間心安禪者作禮於前曰鳥聲歷耳春色盈眸和尚振錫凌空山靈有幸能無一言垂示後學乎豫曰山僧未到月波時花枝鳥語已道了也汝知之麼如其未知不免更為拈出一杖橫擔到月波月波菴畔景何多雨滋柳葉開盈澗風鼓桃花放滿坡處處遊來春爛熳山山聽去鳥吟哦西來祖意和盤托未審心禪會也麼贈嵩敞法姪祖庭秋晚必真實無偽者撑持法道荒涼須學悟圓通者弘播如是則叢席有光不然則宗風何賴邇來雖多傳受於中總不堪任謬得一紙源流便有多般矯詐心鏡未朗倚世利而專逞貢高性海未清附庸鄙而妄行教化出言錯謬招叱辱以無端行事乖張取譏訶之莫罄如斯敗露誠可悲哀若我嵩敞禪師乃豫同派法姪披緇丱歲抱志多年草載離滇諸方參遍禪那精究德行堅培秉毗尼於林壁禪宗受法印於述中和尚迅機如太阿劍觸之則斷人命根作用似走盤珠遇之則耀人心目經旨明徹不愧啓迪後昆品行超倫堪可紹隆先聖隨緣長養不擅拈提較之魔儻狐兒豈啻雲霄土壤爰自己己春孟頓為紫池之遊訪老僧於棲霞峰頭扣真機於威音那畔片言契合兩載盤桓同甘清苦以忘緣共樂幽間而絶往或有時握手松間看煙雲之縹眇或有時分座室內聽鳥語之悠揚月下經行橫斜花影踏碎峰頭舒嘯無邊風月歸懷草木文章逢緣即用山川旨趣遇境便拈若非八面玲瓏焉得一般殊勝愧余德微行鮮悟淺學疏常悲落寞之風徒起匡扶之念羡爾作略迥別氣度孤清堪懸慧月於杖頭可顯真風於拂下開後學之心鏡剔已墜之禪燈覺樹再芳曹源復湧頻抒暢快不盡欣歡片語聊拈高風遠志法門衰落罕逢人氣岸挺然獨有君靈老堂前拈指辨述師室內把燈分梵章講處空知解公案拈時破見聞泛泛時流誰可似堪提白棒逐狐群示紹南監院行難行之事非決烈漢弗能學無學之禪惟英靈子方可卓哉南子久侍老僧夙具拔萃德能便有超凡氣岸髫年割愛永歲忘緣親逼歸而道化多方妻留意而偈辭一紙持心挺特撒手孤剛執侍巾瓶十經歲月掌管院事三歷冰霜主賓上下和融叢林漸次炳煥精白日傳心之妙究青蓮喻法之微其年雖青而志猶大須向百尺竿頭闊步去驪龍頷下奪珠圍堪立建化門庭可弘實際理地中天日月撑持兔角杖頭大地煙雲揮掃龜毛拂下老僧年將耳順業已鬢斑常悲法道荒涼每慨祖風落寞是以間居丈室靜對峰巒未了公案雖存必欲其人方授異爾澄渣性海照徹禪源拈單絲而控玉角麒麟用濕紙而裏金毛獅子始不負灰心泯志侍吾暮請朝參勞爾特書法語用策工夫直教一一圓通自是頭頭顯露才謂之行難行之決烈漢學無學之英靈子也珍重示繼爾書記繼爾禪人法雲眷屬丙寅冬仲求戒來山坐禪期於丁卯春王侍山僧於習安休夏耳提面命精妙有而茅塞稍開暮請朝咨究不無而氣質漸化同餐野粟共飽松花就明月以看經對清暘而補衲五更歲序一守堅心既發意於最初要終志於末後參必參到不立纖毫處學須學至不存些子時自然物物投機頭頭合道丹山碧水盡是那畔文章翠竹黃花無非個裏消息如斯漏逗要使精專但有綿密工夫必無不徹道理是知蒲團七破悟在捲簾白巖三秋惺於擊竹古者既已如是爾輩安得不然剔起眉毛直教打徹豎定脊骨勿使放鬆癡霧豁開心月明迷雲扯破性天淨宜應勇鋭切忌疏慵一朝傑出緇門萬古香生佛剎特為嘉志莫負赤衷珍重示嘯竹副寺參最上禪須立沖霄志習無漏業應具破敵心如是則銀山鐵壁不愁打翻驢腳佛手奚難透脫不見靈雲參持草載南嶽精究八春若非心月吐輝智燈發焰曷能人天頌美今古稱善哉況汝翻然悔昔久矣侍吾宜辦堅強慎勿懈怠定要提起慧刀劈破障蔽將靈雲草載參持處細細檢點南嶽八春精究處密密推窮忽然當陽覷破直下貫通原來最上之禪即在尋常處無漏之業不離日用中也勉之贈圓融法姪不通文翰之者傳燈多載廣覽詩書之輩祖圖不收所以達磨不用半字六祖不識一丁者此也若我圓融法姪不事文墨惟以見性明心不涉世緣獨是耕雲鋤月真達磨之脈派六祖之種草也特書法語以贈示鐵航禪人東山佛法無高無下非正非偏雖然不可以有心求不可以無心會只貴當機薦取覿面荷擔方不負九旬之中磨褌擦褲三月之內斂意攝心遂舉起筆云還是高下耶偏正耶向者裏檢點得出始知東山佛法出自平常珍重示定生戒子客歲來山煎煮趙州茶今歲來山乞求舍那戒客歲今歲且置未審煎茶乞戒的是甚麼人倘若會得則剔倒趙州關捩扯破舍那梵網未為分外脫或未能趙州茶仔細參持舍那戒精嚴守護珍重壽貴陽太守葵菴許護法自古山林野逸從不稱祝公卿大夫今所稱祝者其所稱祝者稱祝公之德重如山也稱祝公之政美若春也稱祝公之精忠無殊器之也稱祝公之大孝不減蓼莪也是所以稱祝也示溪舌禪人參學人參須參到心融法界處學必學至性朗虛空時方可求師印證垂手接人庶不負度水穿雲親師擇友邇來宗風掃地佛日埋雲玉石不分金鋀莫辨雖參而未到與麼境界縱學而未至親切地頭便欲建立門庭揄揚棒喝如此類大似盲人詠日狂夫捕風安能繼續曹源嫡脈中興臨濟正宗若我溪舌禪人有超群志能拔萃風骨不被庸流簧或不為鄙者牢籠求決擇而上東山咨玄要而呈偈頌禪懷磊落道況孤清較未得謂得未證謂證之徒不啻星壤雖然還須豁開眼底障雲放出胸中明月始得暢快到這裏則玉石不分而分金鋀不辨而辨又何患心融法界性朗虛空者哉囑囑示古梅禪者參狗子佛性有無狗子佛性無春色滿江湖登峰舒眺望山川一畫圖狗子佛性有白雲橫谷口歸禽盡失巢處處博風走雖如是不唧溜若遇個中人未免笑破口山僧與麼批判未審禪者能領會也未如未領會須向穿衣喫飯撥火拈香等處看去看到月挂無根樹梅落沒絃琴時許汝來東山堂上向老僧拈起拳云老和尚老和尚且道是有是無示石琴禪者參無絃琴東坡云若言聲在瑤琴上放在匣中何不鳴若言聲在指頭上何不於君指上聽既然且道琴聲從甚麼處生發會得此意不獨會沒絃琴裏聲應巉巖幽谷無腔鼓內嚮震流水高山便會犬吠雞啼松吟澗吼凡有聲者莫不盡會説甚麼伯牙動指子溪知音脫或未然不免重宣此義竹籟鳴時雲石冷松濤起處雨風寒欲知聲韻發生處好把石琴仔細彈示鱗如禪人死何去也生何來剔起眉毛做一回做到二邊不立處紅爐裏面碧蓮開碧蓮開露珠湛八極香風絶點埃只得木人欣滿面石女笑盈腮何也喜他了脫死去生來示道源行者丈六金身乾屎橛此個話頭最親切賺他古今學道流奔南走北無間歇無間歇杖橫四海雲足踏五湖月被人喝得耳聾棒得腦裂為甚麼乾屎橛示巨淵行者如何是佛麻三斤搓就牽牛繩一根挂在不萌枝子上年深月久會精人會精人入水不溺入火不焚縱使大悲千手提之不去金剛寶劍斬之不能且道是甚麼麻三斤劉副臺請題書齋匾并序雲翁護法西夏世家風度卓群英姿挺秀雖居宦海猶羡雲松七載威鎮籠南一期彪炳將府殘雪解而山城秀荒煙靜而隴陌青花植層臺任蛺蝶而飛舞篁修曲徑憑鸞鳳以寄棲講武之餘洗池邀月治政之暇把酒臨風兼以重構花宮遠延龍象壯柳營之春色開至道之香光不減張浚高風豈殊裴休雅況余與雲翁神交數載機扣一朝納鄙拙於個中話幽間於世外是以聊題清嘯用挂書軒暢今日之雅懷集他年之公案云耳示鉢蓮侍者國師喚侍者甚是分明烏窠吹布毛何等親切而人於此不能領會向外馳求則無有是處矧汝賦性淳誠為人朴實且又早脫塵勞久侍巾瓶若非夙植德本何能成就如斯既然胡不將本有妙明當機覷破不無旨趣直下圓通始不負昂頭出愛網信步入吾門也勉之示衣雲侍者英姿妙質既爾培來至道真宗宜乎參去若夫放逸身心耽延歲月不惟師恩友德全乖亦且九族三宗何賴趁此年青力健世泰時清應好將些子關頭透過無邊妙義展開然後拈兔角杖於龍象叢中握龜毛拂於水雲隊裏豈不暢快山僧嘗云學道趁年少時時須覺照關頭透過來是恩俱可報珍重示一源禪者父母未生前本來面目一則話頭能使人當下明心見性了生脫死憶昔東川呂相國致書延破山師翁酉陽問道翁即握杖而赴國出欲作禮翁曰你是呂相國麼國曰不敢翁曰父母未生前姓甚麼國擬開口翁劈脊便棒國奮大疑情至晚省發此豈不是當下明見了脫的爾來參話頭不得省發者蓋為信向不堅固工夫不穩密所以弗能掀翻徹底耳工夫且置如何是父母未生前本來面目緑水含明月青山鎖白雲示話月禪者萬法歸一一歸何處七斤衫子曾為露布不教向外參尋只貴聲前契悟莫因尋須照顧迷時雲滿窗悟去月當戶從上許多拈椎豎拂的哲人不過覷破萬法歸一一歸何處示青林禪孫青年須學道勿負好光陰欲識如如佛應須寂此心如如佛且置且道此心從甚麼處寂莫是建立叢林是莫是料理常住是莫是拈香撥火是莫是送往迎來是若道一切處是瞞盰不少若道一切處不是錯過太多既然且道向甚麼處寂欲向百花叢裏過須教片葉不沾身示樹東禪孫青年剃染執灑掃於滇黔奮志參求侍巾瓶於吳越山川多歷風雨頻經但不識腳跟下事曾明之否如是則執灑掃與侍巾瓶歷山川經風雨無不是箇中消息也珍重法派福海真廣宗道永昌圓明覺性亙古傳芳本山監院真學捐刻老和尚語録第九卷附藏流通伏願心花色麗長春道果香飄億世康熙戊寅歲季夏月吉旦板藏嘉禾楞嚴經坊
