body:
  text: 嗣法門人真解等編拈古舉藥山久不陞座院主白云大眾久思法誨山云打鐘著眾集山陞座一詞不措院主云和尚今日陞座如何一詞不措山云經有經師論有論師怎怪得老僧拈曰藥山久不陞座一天明月末後道個經有經師論有論師遍地黑雲拈拂子云且道明暗相去多少遂擊拂子一下舉僧問雪峰臨濟四喝意旨峰云我初行腳時便過河北已值大師遷化不得見他所以至今不知可往見他直下子孫僧見南院院云那裏來僧具陳前意院展具遙禮云天下古佛矣拈曰雪峰道至今不知米裏有虫南院展具遙禮泥裏有刺顧左右云山僧與麼批判且道臨濟四喝在甚麼處震威一喝云還聞麼舉僧問夾山承和尚有言二十年住此山未曾舉著宗門中事是不山曰是僧掀倒禪床山休去明日普請掘一坑召僧至曰老僧二十年只說無義語便請上座打殺老僧埋向坑中上座不然自著打殺埋此坑中始得其僧束裝潛去拈曰者僧有勇無謀故所大敗夾山有謀無勇故解添兵檢點將來大似一隊無孔銕鎚舉趙州一日見文遠侍者禮佛次州以拄杖打之遠云禮佛也是好事州云好事不如無拈曰文遠即妄遣妄趙州以真印真妄即且置那裏是趙州印處好事不如無舉僧問汾陽如何是祖師西來意陽云青絹扇子足風涼拈曰問如明月橫空無一塵而不照答如春風遍野無一物而不新雖然還有優劣也無拈拄杖云鶯啼千樹綠雲破一天青舉溈山云老僧遷化後往山前檀越家作一頭水牯牛左肋下書五字云溈山僧某甲正恁麼時道是溈山僧卻是水牯牛道是水牯牛卻是溈山僧拈曰溈山僧笑殺人水牯牛笑殺人雙三是六兩二八是一斤豎起拳頭云且道是水牯牛是溈山僧咄咄舉靈雲見桃花有頌曰三十年來尋劍客幾回葉落又抽枝自從一見桃花後直至而今更不疑玄沙云諦當甚諦當敢保老兄未徹在拈曰靈雲一雙青白眼被桃花換卻玄沙三寸綿軟舌把邪正分開敢問大眾且道得失在甚麼處豎拂子云還見麼舉僧問鏡清新年頭還有佛法也無鏡清道有又問明教明教道無拈曰鏡清明豎鎗旗明教暗展戈戟雖然且道謀略在甚麼處明修棧道誰能測暗度陳倉幾個知舉僧問圓悟如何是諸佛出身處悟云薰風自南來殿閣生微涼拈曰大小圓悟便恁麼道大似金剛與泥人揩背舉韓昌黎問大顛和尚近日春秋多少師舉念珠云晝夜一百八拈曰個裏春秋非籌可紀大顛道個晝夜一百八秪可塞責昌黎若答靈利衲僧未敢相許在何故平天花甲子驢年數不清舉僧問趙州如何是祖師西來意州云庭前柏樹子拈曰盡謂趙州富足誰知一貧如洗被者僧索取舊債只得借常住物還殊不知借債償債債依然在頌古世尊陞座策杖尋詩上翠微翠微花柳正芳菲誰知撞遇豪吟者只得吞聲飲氣歸世尊拈花拈起缽羅第一枝人天百萬有誰知雖然迦葉破顏笑已是重栽眼上眉外道不問有無千山雪解曙光通四海冰消春色濃夾岸桃開紅似火揚鞭處處醉東風女子出定人天圍繞大雄才女子座前何怪哉盡謂白雲隨水去誰知明月逐峰來維摩默然徑曲林幽到者稀春深猶自掩柴扉忘言盡日焚香坐一任輕紅淡紫飛遣二比丘薄批皓月細切清風一音大闡萬品廣弘前啟請兮那邊不許後啟請兮者畔不容天地一從盤古闢寒來暑往自相通六祖風幡捫尋好景趁陽和嫩綠深紅莫觸他直到坦平芳草地滿傾茗碗任高歌百丈野鴨父子相攜雲外行翩翩野鴨過前村不期觸犯回天手扭著鼻頭心也疼百丈奇特雄峰矗矗逼長天積翠磨雲勢自然雖則明明絕蓋覆仰彌高也鑽彌堅非心非佛雲在峰頭月在灣一般清味別人間釣磯一坐如山穩憑教狂瀾去復還多羅轉經心迷經轉心悟轉經鶯啼似管水響如琴不涉眾緣兮一任松風落落不居陰界兮何妨山月沉沉自從坐斷兩關後犬吠驢鳴悉梵音產難因緣與人為事須終事度水穿雲信步去幽鳥一聲啼樹間落花如雨平鋪地百丈捲席端然高踞法王臺龍象紛紛齊擁護一陣東風驀地來花香打落知何處百丈開田無端平地起波瀾大義將來換井田換到臨時換不去鋪籃亂扯草芊芊不思善惡度水穿雲奪信衣豈期庾嶺手難提愁腸一段無由釋幸有其人展大慈者邊踢倒兮毒藥轉為良藥那畔掀翻兮火池化作冰池不因踏斷青山也怎信黃梅壁上詩大士講經箇裏真經不涉言其如天子逼弘宣自從尺下彰文彩玉軸琅函滿世間青原階級半嶺松陰禪宇靜四簷花氣鳥聲閒甕風舜日憑歌頌那許紅塵到此閒無位真人赤肉團中無位人雖然易見卻難規分明月在寒波裏撥破寒波月更深南泉住菴茶既飲兮飯既餐破他家事太無端若還不去同床睡焉得知他被底穿南泉牧牯溪東牧去青青草牧向溪西草更青若使東西俱不犯往來何礙綠楊陰百丈野狐昨夜雪封千嶺翠今朝霜打一庭花若謂昨非兮千差萬別如言今是兮萬別千差試看春風平地起枯林花放自橫斜國師三喚喚一聲兮應一聲聲聲不負老婆心若還不是子期輩料想無人識此音乾屎橛堪羨雲門乾屎橛等閒觸著斷疑猜雖然氣息無些子五葉曇花盡點開洞山莖茆亡僧化去問何親火後莖茆句斬新無影林閒花吐色不萌枝上果垂春壁上錢財偶將玄旨探原因壁上錢財用更親說到人情相與處從來宜假不宜真非但曹溪金馬嘶時驚地動陣雲橫處起人愁長鎗短劍如活不見功勛定不休曹溪有兮明撾玉鼓西天無兮暗展機謀自從平定江山後海晏河清瑞九洲南泉斬貓吹毛舉起白如霜血濺梵天孰敢當縱使趙州能救得腥羶早已污雲堂藥山陞座芥子孔中藏世界毫毛頭上現須彌雖然四面無遮障幾個男兒著眼窺大顛擯首座正令全提祖佛憂通身血染許誰酬是非只為多開口煩惱皆因強出頭靈雲睹桃桃花三月吐蒼岑透快靈雲一片心更有尋芳拾翠客春光把斷許誰吟香嚴擊竹不透未生幾許難白巖五載意悠然自慚一擊此君後黑霧依前捲碧天青州衫翁翁年老卻風流衫子拈來答問頭寶月凌空吞萬象何山松竹不清幽破沙盆破沙盆答正法眼叢林笑倒老禪和雖然不值分文價搗蒜舂薑卻要他丹霞燒木佛木佛焚燒絕覆藏眉鬚墮落無遮障不因瑞雪點空中怎得梅花開隴上柏樹子祖意西來問趙州庭前蒼柏與麼酬曾聞是水皆東去未見人傳向北流俱胝指頭信手拈來用不窮逢人盡謂得天龍賺他童子一指失流落古今血跡紅趙州訪上下菴主纔吟山寺北又賦竹林西學得驚人句憑教翻覆題三聖興化因緣綠柳垂蹊徑紅桃映水濱雖然顏色異總是一般春趙州茶淑氣展雙眸乘時跨馬遊雙鵰一箭落何處不風流禾山打鼓家風迥別是禾山毒鼓輕撾非等閒聞者頓教身命喪那容擬議在其間擎杈兮猶涉計較舞劍兮尚歷辛艱何如到處鼕鼕嚮無影林中花破顏曹山問強上座佛真法身因緣花叢唱鷓鴣柳岸歌黃鳥但得詩中法拈來無不好僧問瑯琊清淨本然云何忽生山河大地琊云清淨本然云何忽生山河大地僧忽悟問者問山河答來仍是他憑將楔出楔用力不曾多長慶捲簾何事安中討不安長年思索太無端饒君七個蒲團破捲起簾來也一般僧問古德深山中還有佛法也無德云有僧云如何是深山中佛法德云大的大石頭小的小石頭偶將佛法問來由大石頭兼小石頭住市惟言朝市好居山但說水山幽僧問雲居弘覺禪師僧家畢竟如何覺云居山好剃除鬚髮著伽黎碧嶺清幽好寄棲明月為朋雲作伴一般孤嘯有誰知僧問趙州如何是道州云墻外的僧云不問這個道州云問那個道僧云大道州云大道透長安大道罔知問趙州趙州指處有來由長途綠柳留鶯語雪笠雲瓢君自遊李駙馬問慈明我聞西河有金毛師子是否明云你在那裏得這消息李一喝明云野犴鳴李又喝明云師子吼生平秪愛學桓伊鐵笛無腔信口吹一曲山兮一曲水此音能有幾人知陸亙瓶鵝超群之俊拔萃之英神機莫測玅用難論不損瓶兮雲飛天不動不壞鵝兮月穿水無痕誰知不費纖毫力喚出輕輕秪一聲咄崇福寬闊寬闊之言旨趣深驚天動地似雷霆雖然無舌人能說不是耳聾不解聽九峰丹青一筆丹青習有年如何到此卻難傳曾聞是玉無瑕貴稍有微玼不值錢無相道場無相道場擬欲攀路頭窮處進猶難不因牧笛吹雲破爭見團團月在巒歷村煎茶問到西來鼻祖意茶匙拈起露堂堂可憐不遇盧仝輩空使瓊甌泛雪香爛冬瓜爛冬瓜答如如佛石女聞之笑更便夾岸桃花紅似火一溪楊柳碧如煙資福圓相風鼓幽松聲落落雨敲翠竹韻沉沉須知是響皆傳妙何必從他聽古琴法眼慧超吐玉英梅斜隴陌拖金弱柳拂江濱雖然到處皆春色只恐其人認不真我國晏然玉骨臞臞絕比偷巉巖幽谷許誰親從來不受陽和力一任橫斜自吐春僧問長沙玉自石中出金從礦裏來分明燈是火何事涉疑猜擬成佛也未曾欠少喻刈稻也掃去安排憑灑落任徘徊李白原來是秀才投子劫火劫火焚時萬物焦十方國土不相饒但能穩坐清涼地何怕彌天烈焰高龍牙石龜青青翠竹真如面鬱鬱黃花般若心碑下石龜亦解語其如世上少知音臺山婆子蕭蕭滕六逞精神古逕幽溪積幾層忽遇焚山三尺火頓教化作一團冰倩女離魂香閨寸步不曾離賣弄風流也大奇春雨一簾過別院無邊花柳放新枝溈山水牯不依本分費心情覆去翻來逞姓名縱使皮毛能變換依然眉在額頭橫麻三斤洞山拈出三斤麻丈六金軀不別些試聽子規聲切切年年三月叫桃花婆子燒菴綠柳紅桃滿四鄰其如覿面不知春當時若遇扳花手免使茅菴被火焚投子凡聖舟行鶩驟雲破月晴當陽不薦向外經營是凡兮眉橫鼻直是聖兮鼻直眉橫禹王自闢江河後萬派流通徹底清犀牛扇子扇破還牛逼斷魂可憐侍者避無門莫云春去林園寂應識花殘香骨存高峰墮枕鼓寂鐘沉夜氣深無參尋處正參尋翻身不覺枕頭墮擊碎梅花月一林鳥窠布毛誰識禪翁作用超布毛吹起走青霄不因漁父穿雲引怎見江頭白浪高婆子拋兒剪去情兮斷去思蘆花深處便拋兒此情一段無人識付與波心明月知洛浦藏教缽巖結集靈文後玉軸琅函大藏收更有一般收不得和風和雨塞閻浮風穴古曲異般嚮喨徹層雲震動寒江與翠岑一自木人接拍後知音罕遇到而今梁山祖意有池皆漾月無鳥不啼春更問西來意迢迢十萬程道吾深深問道深深不憚勞相酬殊勝致偏高滿盤托出伊蒲饌未審其人可解消臨濟大悟唇皮兩片原是禍門但能不語那討悶煩喫棒兮無辱招辱還拳兮有冤報冤自從惱亂叢林後污名代代累兒孫又竹自北墻栽筍從東社出長成玉一叢鸞鳳幾枝宿巖頭古帆古帆不挂問原因長耳咆哮說向君東寺鐘鳴西寺應南山雨起北山雲日裏看山祖意明明不我謾見時容易會時難巨靈掌跡華山露來往悠悠幾解看大隨烏龜策杖偕行暢野情東風拂拂鳥聲新峰前春色鋪如錦不會聯詩惱殺人文殊成勞無端一足向僧垂烈焰爐中雪片飛坐久成勞能委悉寒巖枯木吐花肥巴陵雞鴨教乘祖意了無疑何必煩他鴨與雞綠水半灣明月照幽林一帶野猿啼廣教冀州古寺幽深隱翠岑禪扉晝掩似無人不因鄉客傳家信爭識園林盡吐春趙橫高坡平地望坡坡接天深紅淺白畫難全雖然春色重重露忽在後兮瞻在前雪峰南際不贈金帛豈折柳枝為人餞別豐儉隨宜下拜兮酒逢知己飲應喏兮詩向會人題盡情說破雲遊事此去前途無故知首山此經琅函日日青山展玉軸時時綠水開未啟口時如會得何須白馬向東來九峰龜毛西來祖意問山翁點銕成金玅莫窮雲裏木人歌白雪巖前石虎笑春風慈明銀蟾出海銀蟾似鏡明等閒何處不澄清溪山面目吾無隱切忌逢人問姓名疏山造塔無縫寶塔勢巍然何必費他常住錢賺得羅山一臂力又添蓮放季冬天九峰不肯一針針又一針針定要針他病淺深痛處一針肝膽見方知割股救人心蜆子和尚落落安眠古廟翩翩遊戲水濱不應世緣兮韜光晦跡不耕田地兮食蟹餐鱗相逢窄路難迴避腥氣依然吐向人嚴陽一物一層水盡一層山山水重重幾度攀不到山窮水盡處爭知月在水山間雲門明教持竿磯畔倚雲斜釣得金鱗豈類蝦得意歸來何所事焚香漫飲趙州茶鏡清有言客到懶陪意更悠禪床高臥許誰酬庭前春色無人翫花自落兮水自流德山大悟胸中坦蕩蕩筆底興漫漫註一經而猶易轉三心以卒難參龍潭兮頑銕須經大冶吹紙燭兮驪珠秪在深淵焚疏鈔絕廉纖獨據孤峰拈白棒任教佛祖也眉攢親傳的事現成公案任拈提怪語奇言總不施問到親傳端的事答云我是謝家兒板齒生毛搬拳弄掌費精神板齒生毛最有情散步無陰陽地上不萌枝上鳥聲聲仙天野狐棋逢敵手琴遇知音野狐兒送者送八兩老禿奴酬者酬半斤蒼池邀月白翠竹引風清棲鳳皇也須梧桐樹貯獅乳也必琉璃瓶首山菩提粉蝶戲花穿徑岸黃鶯啼柳渡江濱家家有路通霄漢何必從他別問津昌黎大顛狂心焂爾歇來造大顛門纔問春秋數念珠信手呈扣玉齒兮無端漏逗責藜杖兮太煞分明聖人不降閻浮世爭見黃河徹底清投子三身啼鶯落落鳴如管流水悠悠嚮似琴會得這般談說處不須向外問圓音陸亙鐫石蒼蒼片石最靈然擊著琤琤應劫前不但磨礱風與月還教收放雨和煙虎丘悟也曾點首於生老女媧賢也已煉補於青天一自大夫穿鑿後至今不值半分錢狗子有無趙州美譽播叢林何事當機不斬新若使中間能坐斷免教兩處費精神謂其有也尋思不見謂其無也晤對分明那時節少英靈舌上任從擺甲兵劈脊若還三十棒看他面目那邊存嗣法門人寂和捐刻本師和尚語錄第七卷附藏流通伏願禪燈續燄層層法脈分流處處康熙戊寅歲季夏月吉旦板藏嘉禾楞嚴經坊
