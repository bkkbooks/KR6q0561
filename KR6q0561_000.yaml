body:
  text: 序原夫恆星不見竺乾之敬以為禪為淨為律為講所入不同究竟則一無非以妙明之心成無上之覺而已飲光尊者靈山一笑直踏毗盧之頂教外遂有別傳至二十八傳而少室直指於西來又五傳而曹溪呈偈於書壁於是正法眼藏播流震旦迄於今千二百餘年矣其間大機大用莫不各有其語因各有其録以闡宗風得意者固可忘言因言者亦可生悟莫之或廢也惟正法之凌夷故邪外之交熾在經而非於律在律而非於淨在淨而非於禪各欲分茅裂土互為詆訟安能歸一實於三車攝千枝於五葉也哉獨梅師大和尚源承破老拂授靈公內外雙融權實互用單提向上普被三根洵逆風之栴檀而絶流之香象也前已刊行流布鉗錘後學今欲翻板附藏津逮十方其翹廑至矣而吾猶有疑焉既云不立文字何為饒舌不休得無以矛陷盾乎不知正以楔出楔也梅師契即此證彼之旨抱自利利他之心王舍城之結集將以破愁悶於諸天亦悲愍中之方便耳顯正乃可破邪立真始能袪妄所謂一千四百餘部不為多一句也無不為少其是也夫梅師箭鋒著處致撫軍慕公為新梵宇固無異祗陀之施樹給孤之買園而中丞田先生紀東山之勝亦以能詩見稱又何異皎然之遇顏公了元之值蘇子哉道藝既隆因緣不小乃圓覺一敘不問於當代之巨公而問於窮山之逸老豈以余為裴頭陀耶噫誤矣時大清康熙辛未歲春三月紫泉天間老人吳中蕃大身氏和南書東山梅溪禪師語録目次卷一序上堂卷二上堂卷三上堂卷四上堂卷五小參卷六茶話佛事機緣卷七拈古頌古卷八佛祖贊自贊歌書問卷九法語法派卷十示偈聯芳行由東山梅溪禪師語録目次終
