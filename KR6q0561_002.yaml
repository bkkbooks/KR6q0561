body:
  text: 嗣法門人慶緒等編上堂二康熙壬子二月初一受威武守禦所美升趙護法暨紳襟衆居士等請就關聖祠結制上堂師以杖指法座云這個寶座隨處高登昔年升於鎮西今日升於威武致使龍象交參人天圍繞雖然如是大衆還知出處麼若知出處何妨攜手共升如其未知山僧獨坐去也拽拄杖遂升拈香祝聖畢次拈香云此瓣香自從説破不敢囊藏此是第二回拈出爇向爐中供養傳臨濟正宗第三十二世先師靈隱文老和尚用酬法乳之恩伏願燈傳不盡綿綿續生度有緣處處逢斂衣敷座維那白椎竟師云燭花光寶座香霧噴人天若是英靈客何妨信手拈顧左右云有麼有麼問離四句絶百非意旨如何師云遍界且無藏覓處進云恁麼則天上人間去也師云分明一點座中圓問月到天心處風來水面時一般清意味料得少人知和尚知不知師云不知進云既是善知識如何不知師云若知則不是善知識問達磨未到東土時如何師云處處白雲橫谷口進云到後如何師云家家紅杏出墻頭問如何是大死的人師云七花八裂進云如何是大活的人師云八裂七花進云死活拈過一邊速道速道師驀頭一棒云是死是活進云蒼天蒼天師云蒼天蒼天進云二俱若是是何意旨師云一張沒絃琴對枝無孔笛問昨夜鼓玄風鐵樹吐花紅玄風即不問花紅時如何師云你的眼睛為甚被他換卻進云古人為何又道見色明心師云莫謗他古人問學人以虛空為鼓和尚如何下椎師以拄杖當頭一擊僧作聽勢師云切忌承虛接響問如何是清淨法身師云山光水色進云如何是無生法忍師云鳥語溪聲進云如何是本地風光師云穿衣喫飯乃云春色平鋪法筵肇啓香雲鶴雲并布花雨膏雨齊飛萬象揚眉森羅吐氣所以道欲識佛性義當觀時節因緣正恁麼時時節因緣且置作麼生是佛性義舉拂子云見麼見麼這裏見得則山河國土草木昆蟲悉現清淨法身也擊香案云聞麼聞麼這裏聞得則風動水流猿啼鶴唳悉説無生法忍也按下拂子云會麼會麼這裏會得則拈香撥火待客迎賓悉露本地風光也到這境界則虛空為鼓鐵樹花開以至大活大死已到未到料得少人知絶百非離四句的無不米釋可謂一明一切明一透一切透召大衆云山僧恁麼漏逗衆中莫有同見同聞同會者麼若有不妨同歌白雪共唱陽春如無山僧自歌自唱去也以拂子擊香案一下復舉圓通和尚開堂云圓通不開生藥鋪單單只賣死貓頭不知那個無思算喫著通身冷汗流師云圓通老漢雖是家風迥別手眼超群檢點將來不免腥臊遍地今日山僧也無生藥鋪開亦無死貓頭賣舉拂子云單憑這個放大寶光破諸幽暗要令十方三世九類四生同開金剛正眼共契涅槃妙心雖然未審與圓通是同是別雲向嶺頭拖雨去鳥從花裏帶香來維那結椎云諦觀法王法法王法如是下座李越生護法請上堂問風吹柳絮毛毬走雨打梨花蛺蝶飛時如何師云腳跟下好與三十棒問如何是清寥寥曰的的的師云高著眼進云如何是孤迥迥峭巍巍的師云高著眼進云恁麼則一箭兩垛去也師云闍黎傍觀有分問和尚辨才如此未審昔日從甚麼處來師云阿鼻地獄裏進云他日又向甚麼處去師云阿鼻地獄裏進云既為人天師因甚來去不離地獄師云此是山僧受用之所進云一切人還受用得否師云得即得猶恐承當不下問如何是第一玄師云明月與清風論道進云如何是第二玄師云溪聲共山色談禪進云如何是第三玄師云木人與石女來往進云如何是第一要師云飢則進食進云如何是第二要師云寒則向火進云如何是第三要師云困則睡覺進云三玄三要如斯指覿面一句若為論師云還我三玄三要來即向汝道問古人道門外春將半山房總不知可憐拄杖子暗裏自抽枝如何是拄杖抽的枝師云雨洗淡紅桃萼嫩風搖淺碧柳絲輕問如何是威武境師云一溪緑水淘明月幾個青山鎖白雲進云如何是境中人師云手握敲風杖身披無上衣進云無境無人時如何師便打問是水皆涵月無山不帶雲秪如水竭山崩雲月歸於何處師驀頭一棒云在這裏進云恁麼則山雲水月不離和尚棒下師云知音不必重拈出問風從花裏香來水向石邊流出是禪否師云眼裏著沙不得進云泥牛吼月木馬嘶屬是道否師云耳裏著水不得問與諸佛為侶者是甚麼人師云個裏人進云個裏還許壁立萬仞否師云非但壁立萬仞從教萬仞壁立乃云問似雲興答如瓶瀉且置阿那個是你諸人自己衆無對師復云這一段事只要個中穩密自然左右逢原適才這僧問與諸佛為侶者是甚麼人山僧向道個裏人諸昆仲且道此人具何手眼堪與諸佛為侶倘若會得便會風吹柳絮雨打梨花清寥寥白的的孤迥迥峭巍巍以至甚處來甚處去三玄三要柱杖抽枝威武境境中人水乾月歸處山崩雲去時風從花裏香來水向石邊流出泥牛吼月木馬嘶風法法頭頭無不是你諸人自己還委悉麼卓拄杖下座談繼芳請上堂歷歷和風生上苑悠悠鳥語囀喬林欲知個裏真消息試聽風聲與鳥聲以杖擊法座云還識此聲麼靈山拈花亦此聲少室安心亦此聲打車打牛亦此聲踢倒淨瓶亦此聲以至捲簾搖扇擊竹觀桃搖鈴舞笏輥毬張弓無非此聲還委悉麼頻呼小玉原無事只要檀郎認得聲又以杖擊座一下下座大悲菩薩誕日上堂問天下同此日大地曇花現花現即不問同的事如何師云吸露千般草吟風一樣松問大悲千隻手那隻是正手師云楊柳枝枝緑進云大悲千隻眼那隻是正眼師云桃花朵朵紅進云千手千眼蒙師示頌祝一句是如何師云兩班龍象堂前立一瓣心香信手焚乃云山際花含露枝頭鳥弄音良哉觀自在此日示全身垂一手八萬四千母陀羅手俱備舒一目八萬四千清淨寶目皆然所以無剎不現無處不真隨機應感利濟群生求饒益而饒益大求福慧而福慧深大衆大悲方便之力理合如是的當之處又且如何擊拂子云還聞麼便下座本師靈隱老人忌日拈香師拈起香云這老和尚生平的把柄盡在不肖兒手裏今日要他上天堂也在不肖兒要他下地獄也在不肖兒既然且道老和尚的把柄在甚麼處遂插香云見麼朱世傑請上堂問昨日杲日麗天今朝瑞雪鋪地還是神通耶妙用耶師云任爾卜度僧佇思師震威一喝乃云昨日杲日麗天今朝瑞雪鋪地分明揭示無私要且不容擬議還有不擬議者麼顧視左右下座孔自還楊嘉旺林自奇請上堂無明即佛性玉出頑石之中煩惱即菩提蓮開淤泥之內大衆當知麵在麥裏米在榖中會麼河裏失錢河裏摝李長庚請上堂問如何是佛師云破糞箕乃云這裏撥得一線路去始知雲門乾屎橛些子不瞞洞山麻三斤纖毫無隱到這裏則煙雲竹樹莫不皆心水鳥山花無不是佛説甚麼三十二相八十種好不見道溪聲盡是廣長舌山色無非清淨身上堂未上堂時誰當辨的既上堂後孰是知音良久云不免舟橫緣水棹舉清波歌唐堯年唱清平樂何故可惜連城璧徒勞獻楚君寶山皈一請上堂拈拄杖卓一下云木上座為汝諸人轉大法輪了也還會麼倘若會得便會沒絃琴裏落梅花無根樹上巢靈鵲木人撫掌石女烹茶如其未會再煩木上座饒舌一上復卓拄杖一下定初監院請上堂一溪緑柳如煙幾樹梨花似雪誰謂寂爾無聲晝夜熾然常説正恁麼時寂爾無聲的拈過一邊熾然常説的如何話會依稀似曲才堪聽又被風吹別調中美升趙護法為母蔡宜人延生請上堂問趙護法重重供養且道得個甚麼師云得個億劫長存的進云若論這個人人本有師云也須山僧説破問深重之恩莫過於母未審將何報答師卓杖云拈出無私一句子從教何處不相酬進云如此則不獨報母深恩四恩俱巴力盡師云幸得闍黎證明乃云今日乃美升趙護法尊堂蔡宜人誕日來此選佛場中營齋供衆敦請山僧升座説法頌祝尊堂大壽山僧愧於舌短無法可説豎拂子云只將這個對衆拈出你諸人若向這裏著得一隻眼便知他尊堂的壽量大地莫能比虛空莫能喻到這裏非但報現在慈親則過去七代先靈無不報答還委悉麼這般壽量如能會是則名為報母恩浴佛上堂指天指地是今朝天下同將惡水澆澆得瞿曇無走處藏身芥裏自叨叨大衆且道他説個什麼他道自從降迹閻浮世水厄年年被一遭解制美升趙護法請上堂問如何是佛事周圓句師云摘下金鐘玉板進云如何是途中行腳句師云煩他竹杖芒鞋進云他日相逢又作麼生理會師云再理舊詞連韻唱乃云拽斷黃金鎖鑰打翻白玉欄杆放出一群獅子吼遍緑水青山震威一喝下座康熙壬子九月初一日住安籠華光寺休生監院請傳戒上堂問如何是安籠境師云玉泉寺對海潮寺天榜山連萬壽山進云如何是境中人師云晨敲清磬暮擊疏鐘進云人境蒙師示清淨比丘如何不上天堂師云道破了也進云破戒比丘如何不入地獄師云道破了也乃云未到安籠扶笻頂笠涉水登山如雲如鶴已到安籠拈椎豎拂説妙談玄如象如龍雖然且道行腳與駐錫是同是別若道同又有行腳駐錫之分若道別又有殊途一致之謂諸子還分疏得麼若分疏得不惟登其戒品要且定慧雙融説甚麼清淨比丘不上天堂破戒比丘不入地獄脫或未能只得落草盤桓去也遂傳戒畢下座郭維政曾繼芳郭登芳沈代明請上堂問如何是不二門師云四生同出入進云如何是一真界師云六道共安居進云如何是自在心師云孤雲野鶴進云如何是空花相師云暮雨朝煙乃云前日上堂轉法輪今朝升座法輪轉顛拈倒弄為諸人總要諸人開正眼如是則丹崖翠嶂悉皆不二之門鬧市紅塵無非一真之界説甚麼自在心空花相還委悉麼瘦藤扶上孤峰頂那個遊人眼不寬周用明楊世文謝國芳曾遣意請上堂問如何是死句師云石頭進云如何是活句師云石上生苔進云死活且置如何是十無話師云從頭問將來進云如何是無底船師云橫撑緑水順泊蘆花進云如何是無底鉢師云滿盛香飯濟人天進云如何是無底籃師云攜從碧嶺去滿載山花來進云如何是無根樹師云葉森森地進云如何是無孔鎚師云拈起則虛空粉碎放下則大地平沉進云如何是無孔笛師云吹來句句落梅花進云如何是無縫塔師云滿載黃金骨彌封青蘚痕進云如何是無鬚鎖師云鎖斷要津不容走作進云如何是無絃琴師云高山流水韻悠悠師云如何是無星稱師云輕重瞞他不得進云十無蒙指點如何是祖祖傳不盡的師云還我十無話來即向汝道僧擬議師便打問如何是禪師云爐內烹茶月落泉進云如何是戒師云松頭挂錫雲生樹乃云梵鐘扣處高低應法鼓鳴時上下聞這裏若能親透脫何須欲我話無生擊拂子云還聞麼若也聞得始知死句也在裏許活句也在裏許甚至十無禪戒總在裏許正恁麼時殊途一致的句作麼生道千峰勢到嶽邊止萬派聲歸海上消臘八雷應富請上堂問嶺上梅花笑爐中香氣紛如何是第一義師云未上堂時已道破進云明星朝北拱緑冰向東流如何是如來成道句師云踏著稱鎚是鐵團進云檀那傾心設供大衆恭敬圍繞和尚如何指示師云兔角杖挑潭底月龜毛繩繫樹頭風乃云一點明星照四維十方國土悉同窺慚他黃面瞿曇老打失蒼蒼兩道眉大衆那裏是他打失處良久云個中有話無人説付與金雞午夜啼康熙癸丑住雲南廣西府玉皇閣佛成道日陳壯猷龍應秀芶國用王振乾張騰芳楊舜昌朱色艷呂岐鳳等請上堂去歲今朝安籠説法今年此日瀘西上堂可謂遇緣即宗隨處作主舉拂子云且道是安籠的瀘西的於此緇素得出則他方此土無殊去歲今年不別脫或未能聽取一頌一年一度慶斯辰雪壓嶺香自紛以拂子向空點云會得明星高照處這邊那畔復何分為母歸元尼三周上堂問前日上堂慶佛今日上堂薦母且道前日的是今日的是師云一粒瓜子兩瓣殼進云如此則忠孝全歸和尚師云又恁麼去也乃云瞿曇為母升忉利羅卜尋娘詣獄門獨有梅溪分外別華王座上薦慈親喝轟處地獄天堂打成一片棒落處無明佛性坐斷兩頭雖然且道我母即今在甚麼處遂拈香云也甚奇怪適才拈一瓣返魂香引得我舟在山僧拄杖頭上現三十二種妙相諸人見麼擊香案云又道諸行無常是生滅法聞麼這裏見得分明聞得的當則人人圓秋本體非在別處個個無字真經不越其中天堂地獄匪差殊佛性無明豈間隔正恁麼時當下解脫一句作麼生道卓拄杖云喝似雷聲轟劈面棒如雨點擊當頭我慈是日承茲力脫體風光任自由本師靈隱老人忌日拈香屏山似畫瀘水如藍無別為供信手憑拈插香便拜住雲南蒙化府等覺寺師誕日了然僧綱請上堂問法身等虛空本無生滅和尚如何有生師云秪因生滅不相干故現光明於此日進云現後如何師云青山照舊緑水依然進云無山無水時如何師震威一喝僧亦喝師云爾我俱喝賓主在甚麼處僧轉身打一圓相師云腳跟下好與三十棒問如何是一體大道師云庭前兩樹柏座上一瓶花問昔日世尊降誕手指兩儀足行七步云天上天下惟我獨尊今朝和尚生辰露何手眼師云拄杖七尺長月朗問和尚生辰即不問且道受性者誰師云堂堂一個月朗進云悟性者誰師云堂堂一個月朗乃豎拂子云自得先師斷拂子魔宮虎穴恁麼舉只知隨處利群生不覺今年四十矣秪見蒼松稽首白石和南溪撫伯牙之琴山展僧繇之畫無生曲庭前鳥唱不老詞簾外風宣雖然怎奈露柱未肯相許何故他道仁者無生無滅非減非增同於金剛常住不朽如何還有這個在時燈籠聞如是説向前驀豎一指曰且道是生滅耶非生滅耶增減耶非增減耶試道看倘若道得許爾啓如是口演如是義不然如人説食終不濟飢與論至此忽被個傍不肯的一喝喝散惟見香騰寶篆蠟吐優曇龍象繞法座之前鐘鼓震雲天之上正恁麼時且不涉增減是非得失的句如何舉似雙塔如峰排檻外清泉似帶繞門前本師靈隱老人忌日拈香師詣案拈香展禮竟召大衆云年年此日爇栴檀歲歲今朝展布單引得燈籠并露柱一齊撫掌笑喧天且道他笑個甚麼笑山僧世相不忘佛誕灼然尼請上堂問龍象雲臻即不問世僧降誕事如何師云特地始稱尊進云秪如雲門道我當時若見一棒打殺與狗子喫貴圖天下太平還有過也無師拈拄杖云這是甚麼所在容你覓過乃云庭前蒼樹啼幽鳥郭外青山捲翠雲一枕薰風眠未已諸僧請慶釋迦文雖然秪如這僧問當時雲門欲一棒打殺與狗子喫貴國天下太平還有過也無山僧向道這是甚麼所在容你覓過諸人還委悉麼若能委悉則山僧未上堂時已慶了也烏用撾鼓椎鐘搖唇鼓如而謂之慶耶如其未能帶纍釋迦老子年年於此日惡水驀頭淋康熙丙辰歲受雲州張太守洎檀越居士諸山禪德請住玉閣禪院三門百雉連雲橫戶外千峰積翠擁門前諸人看取腳跟下莫錯臨機一著先拽拄杖便進大殿馬牛憑我應仙佛任他成但得空諸相何須立假名還有空得者麼如無不免將錯就錯展具便拜方丈這個所在諸佛於此轉法輪列祖於此傳心印山僧今日到來又作麼生施設棒似三春雨喝如五夜雷卓拄杖喝一喝結制太守張護法設齋請上堂指法座云千華砌就百寶堆成佛佛共坐祖祖咸升今日現於一毫端上還有與山僧同登者麼良久云舉頭天外看誰是我般人卓拄杖遂升拈香祝聖畢再拈云這瓣香棒頭花劈喝下圓成昔年馥郁黔山今日澄清昆水此是第三回拈出爇向爐中供養傳臨濟正宗第三十二世先師靈隱文老和尚用酬法乳之恩伏願直指佛祖根源永作人天眼目斂衣敷座維那白椎竟師云若論第一義諦未升座時松聲竹籟已道了也更要畫蛇添足作麼於中倘有未會者出衆相見問孤將入雲陽即不問忽遇百萬雄兵到來如何抵敵師豎拄杖云單憑一柄吹毛劍僧退後師云草賊大敗問如何是西來大意師云幾片間雲飛嶺上進云如何是涅槃妙心師云一輪杲日挂天邊問如來成道二千餘年和尚成道多少年也師云忘卻了問四大五蘊本自空寂主人公在甚麼處安身立命師卓拄杖一下進云可謂不涉語言最親切師云切忌錯下注腳問生從何來師云沒蹤迹處進云死從何去師云沒蹤迹處進云蹤迹既無甚處住腳師云沒蹤迹處問和尚婆心處處且道為個甚麼師豎拂子云為要交代這個問選佛場開以何垂示師云痛棒爇喝進云恁麼則祖道重興宗風再振去也師云有勞讚頌乃云也大奇也大奇將謂拂衣徑過豈知留錫於茲選佛場一期結就龍象衆兩序整齊金鐘扣處靉靆香雲布座玉板鳴時繽紛花雨飄墀可謂法不孤起仗境而立道無方所隨寓即施驀豎拄杖云會麼這裏會得始知此個消息如風之在竹月之在池不容話會秪許自知大覺仙厚著面皮假一花而拈示老迦葉萬沒奈何破雙眉而笑嬉是以冤流六十九遞序到山緇山緇無別有單憑杖一枝魔宮倒挈虎穴顛提劈聖解於頃刻破凡情於片時致令青山撫掌緑水揚眉泥牛踏月吼木馬驟風嘶三世能仁憑斯契證歷代開士即此傳持正恁麼時古今同化一句作麼生道歲歲梅花和雪綻年年楊柳帶春垂結椎下座默契監院請開示上堂道人胡不耐清間撥草瞻風入市寰秪為祖庭多寂寞故呼明月守柴關山僧雖則志耽泉石骨老松雲而於接物利生之心尚未冷湫湫地是以策七尺笻量不盡之青山著一緉履涉無窮之緑水或避風雨於樹下或挂蒲團於旅亭遵先賢之直指慨此日之荒涼然道假人弘非人何以揚化琴借指押無指豈能發音是知究竟在人而不在法今承默契大德懇請升堂説無生忍然而無生法忍本自歷然毫無隱覆且又榴開庭際燕語簷前枇杷園裏低垂梅子枝頭盡熟重重揭示一一敷陳何待山僧搖唇鼓舌而後謂之佛法耶於此會得始知佛法在一切處一切處即是佛法顧左右云山僧與麼漏逗也是第一等不著便的若是靈利衲僧一場好笑何故長安風月貫今昔那個男兒摸壁行卓拄杖下座楊勳楊雲章楊淮葉勝祖請上堂前日上堂語言直示今朝升座棒喝交馳引得薰風生席梅雨飄簾當窗樹色蒙蒙而映襲衲蓮香冉冉而來雖然未審諸人正法眼明否若也明得始知妙道目前觀真宗耳底透所以長慶七蒲坐破卻在捲簾處發明香巖五載白巖而於擊竹時打徹是知從上先德不離見色明心聞聲悟性召大衆云這般説話大似守株待兔求劍刻舟何故有聲有色如斯會無色無聲愁殺人上堂舉老宿云結制得數日也水牯牛作麼生一老宿云結制得數日也衣線事作麼生一老宿云作麼生作麼生師云三負老宿恁麼作略也是烏焉成馬大衆山僧結制得數日也不問水牯牛也不問衣線事也不問作麼生只要諸人飢來飽餐困來熟睡召大衆云還有這般漢麼若有出來打禾山鼓唱清平樂如無莫將無事為無事往往事從無事生張聖質秀才請上堂山僧連日把堂升單以杖頭而接引惟有今朝不恁麼只教薦取吾無隱豎拂子云會麼即今蘭膏焰炯柏子香清幾般花綻庭前一色草青階下頭頭不別處處匪殊只要諸人盡底荷擔勿留些子顧左右云還有荷擔者麼若有不負聖質秀才生希有心梅溪長老出廣長舌如無未免葛藤一上復舉黃山谷問黃龍禪師如何是吾無隱乎爾龍云公問木犀花香麼谷云聞龍云吾無隱乎爾谷乃大悟師召大衆云黃龍當時一言山谷便乃悟去山僧今日與麼諸人因甚不會分明月在梅花上看到梅花早已遲陳大廷請上堂為訪吾門最上乘幾回冒雨到雲城今朝升座無餘示仍指中庸一點誠從上諸儒莫不以此一誠而入裴相國以此一誠而了心黃檗白居易以此一誠而請益鳥窠韓昌黎以此一誠而參禮大顛張無盡以此一誠而發明兜率從上諸儒既以此誠而入道今日山僧亦以此誠而説法只此如是之法奉為陳大廷并法筵清衆伏願正心誠意之旨直下圓通了生脫死之方當陽透脫正與麼時薦取一句作麼生道但得不欺於個裏自然在處合中庸上堂舉僧問雲門如何是超佛越祖之談門云胡餅師云今日有問如何是超佛越祖之談便擊禪床云諦聽大衆且道雲門的是山僧的是這裏定當得出則雲門不先山僧不後倘或未能聽取頌出胡餅拈時超佛祖禪床擊處震虛空秋來金菊含霜冷春到桃花吸露紅戴居易秀才乞受三皈請上堂不負靈山記莂來幾曾參禮法王臺而今欲返圓明本自性三皈為指開何謂自心佛即此靈然獨耀亙古恆輝無差無別非修非證者是何謂自心法既了本心之佛則逢緣不惑觸境露機事事圓常頭頭如理者是何謂自心僧既證自心之法則濟物應緣如水中月清清湛湛不染一塵者是此乃自心之三寶也諸佛得此心故曰能仁諸法詮此心故曰祕典衆生了此心故曰力生而過去諸佛法僧自心三寶已證汝今翹勤合十向我傾誠自心三寶現證倘能奉持此教誨示後人明其此心自心三寶未來同證是知此心包太虛羅國土可謂衆生即佛佛即衆生不曾差別一毫以此心而悟佛何佛不悟以此心而詮法何法不詮以此心而了僧何僧不了知此心不在內外中間則罪性本自空寂知此心清虛靈妙活卓圓明則拈香撥火喫飯穿衣一一無非佛事知此心在在不隔處處皆真則西方即在目前以之雪罪而罪雪以之率道而道成能如是則悟佛無佛可悟詮法無法可詮了僧無僧可了拈拂子云山僧揭示如斯汝能透脫也未若能透脫則汝未跨門時自性三皈已受山僧未上堂時自性三皈已説倘或不爾未免頭上安頭遂唱三皈下座披剃上堂圓頂當陽露雲衣直下披廓然三際斷何處不光輝解制上堂四月十六結卻布袋口大家在裏許磨褌嚓褲苦骨勞筋七月十六解開布袋口大家出外邊擔囊負鉢涉水登山雖然秪如不結不解之時你諸人在甚處住腳若知住腳所在則三千世界總一道場百億河山皆一佛剎有情無情是中出入真諦俗諦此內交參何須九旬白足三月調心正眼觀來卻是畫地為牢無繩自縛正當恁麼時本分説話且置臨行慶賞一句作麼生道竹杖肩頭橫皎月芒鞋足底踏秋雲師誕日衆居士請上堂去歲今朝等覺寺中雲水聚今年此日玉閣堂前龍象臻梵鐘嚮天上人間法鼓聞他方此界是則是怎奈山僧無所從來既無所來即今在座説法的是誰於此倜儻分明不妨共飲曹溪水同餐栗棘蓬如其未能髮從今日曰花是去年紅本師靈隱老人忌日拈香雲州城畔玉閣堂前吾師忌日一瓣香拈大衆先師老人來也風吹岸柳千尋緑雨點庭桃一色紅三官殿嗣法門人海偉捐刻本師和尚語録第二卷附藏流通伏願長開般若之花永結真如之果康熙戊寅歲季夏月吉旦板藏嘉禾楞嚴經坊
