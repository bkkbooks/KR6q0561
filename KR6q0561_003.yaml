body:
  text: 嗣法門人真解等編上堂三住師宗州觀音閣師誕日趙養浩張甲科楊英張懋猷雷運通杜貞杜元徐明朱超鳳蔡萬高徐運通同監院海順等請上堂問久嚮和尚悟入三摩非生非滅因甚又道降生師云獨露堂堂人不會故將安置在斯辰問海衆雲臻即不問和尚示生有何祥瑞師云半嶺雪梅一庭煙柳進云祥瑞且置秪如師陽衆信精誠未審利益有多少師云數不完記不盡問如何是一無歸萬有師云春暖百花放進云如何是萬有歸一無師云秋深萬木凋進云有無未彰如何領會師拈拄杖云向這裏薦取空徹問人人念佛佛念甚麼師云念空徹問和尚生辰即不問二親劬勞如何報答師拈拄杖云單憑此個力乃云寒暑去來疾似箭居諸往返快如梭一從策杖來昆水彈指經今六載過而今欲返夜郎去不意諸檀留此住各以一香并一花持來為我祝初度兼請升堂把舌饒頻撾法鼓震丹霄一條白棒驀拈出下下都從痛處敲點點血星飛碧漢星辰日月悉昏暗盲龜跛鱉怕怖生稽首座前乞方便我宗從不涉言詞只貴當人直下知設使與君談論得瞿曇詎肯拈花枝應識人人本體具一非即也一非離秪因妄想與攀緣所以長年相鈍置二六時中須自強莫教碌碌背圓常眼前日子如花費只恐臨時徒自傷趁斯力健與身壯抖擻精神做一上非滅非生坐斷來無生曲子憑敲唱無生曲子且置如何是非生非滅一句秋來諸樹皆凋葉春到群花盡吐香卓拄杖下座觀音誕日衆戒子請上堂問祖道中興如何舉唱師云春風浩浩如雷吼進云王道遐昌如何讚頌師云祥雲冉冉覆河山進云秪如天下太平萬民樂業又作麼生師云村歌社舞自成曲問太陽門下日日三秋明月堂前時時九夏意旨如何師云這是甚麼所在說秋說夏進云如此則慶誕一句又作麼生師云三瓣栴檀一雙樺炬乃云幾片錦雲騰梵闕一簾膏雨點禪林升堂為慶圓通誕聽得黃鸝講佛心擊禪床云聞麼聞麼於此聞得凡舉一念則一觀音示現舉百念則百圓通現前更說甚麼三摩地自在心南海岸紫竹林紅桃緑柳盡是滿月慈容鳥語風聲無非普門舌相顧左右云且塵塵覿面一句作麼生道見聞端的如能透等閒何處不圓通卓拄杖下座十月初一傳戒上堂四月初八說戒純清絶點十月初一說戒絶點純清雖然怎奈天榜山未肯點首何故他道仁者紹祖基業傳佛心宗何不橫拈白棒直指根源使人當機徹證直下荷擔傳甚麼龍盂虎錫臥具田衣講甚麼冰清梵行雪淨毗尼不見道惟此一事實餘二則非真時珍珠泉忍俊不禁乃勵聲曰爾這漢又偏耶豈不聞禪定智慧以戒為基菩提涅槃以戒為本三世能仁孰不由斯證道歷代開士阿誰越此度人故曰過去諸如來斯門以成就現在諸菩薩今各入圓明未來修學人當依如是法與論至此焂忽霜風入座寒月澄空珍珠泉依然湛湛天榜山照舊巍巍敢問大衆且道天榜山說的是珍珠泉說的是試分析看若分析得則山僧四月初八與十月初一說未曾說著半字諸人十月初一與四月初八受未曾領受一法圓陀陀人人本有光灼灼個個不無到這裏一任手把豬頭衣包狗骨其或未然且將新戒體搭起舊袈裟惺源請上堂霜風颯颯林葉飄飄涼霧籠山頂寒雲鎖樹梢山僧掩室把爐燒聽得堂前鐘鼓敲偶登曲彔木棒喝不相饒驚起海底泥牛吼崖前石虎哮大衆且道明甚麼邊事俱胝但把指頭豎普化惟將鈴鐸搖卓拄杖下座到普安縣緑蘿庵尹正楚黃玉科馬顯成張夢蘭等請上堂爛熳春光二月天桃花是處吐枝鮮靈雲打失娘生眼流播人間今古傳豎拂子召大衆云那裏是靈雲打失眼目處試檢點看檢點得出始知重重煙景非從別處開敷歷歷風光盡在個中發現說甚麼劉阮溪邊馬蹄踏踏王謝堂上燕語嘈嘈塵塵華藏門處處真如界雖然衆中莫有不被境轉者麼如無不免據款結案粉蝶尋芳穿檻外金鶯出谷繞枝頭雖然滿目皆春色切忌遭他換兩眸康熙乙未六月十二受駐防王守戎洎衆居士等請住普安縣圓通寺到院上堂圓通山頂別是乾坤雲樹參天樓臺接日鳥頌劫前之韻泉鳴個裏之琴可謂古今勝地龍象真蹤到此不弘宗教禪子何以知歸不免八字打開普使當機透脫震威一喝云聞麼這裏聞得始知一喝分賓主照用一時行又喝云且道這一喝是賓是主是照是用於此脫然省去一任作宗門真表臨濟遠孫四料揀斬新揭示三玄要劈面指揮說甚麼金剛王劍踞地師子探竿影草喝不作喝脫或未能仍向圓通山頂一一覷破始得浴佛上堂拈拄杖云這裏是毗嵐園無憂樹悉達太子即今下生手指兩儀足行七步諸人見麼卓一下云又道天上天下惟吾獨尊聞麼若也聞見分明可謂人人兩耳圓通個個雙眸炯碧所以道即此見聞非見聞無餘聲色可呈君個中若了全無事體用何妨分不分到這裏始知二千年前九龍吐水浴的與今日一衆舉手澆的無二無別既無二又無別則古之悉達即今之悉達古之四月八即今之四月八何有纖毫之變易哉雖然即如四月初八已前還有山僧啓口處也無顧視左右下座傳戒上堂舉袈裟云會麼這裏會得便會佛性戒珠心地印霧露雲霞體上衣講甚麼防非止惡重難輕遮如謂不然遂度袈裟云且從這裏擔荷師於康熙癸亥冬還貴筑之棲霞乙丑冬撫軍慕大檀越暨闔省文武諸公重建本山值豎殿日師集衆上堂揮拂子云棲霞開建百餘春幾度遭逢兵燹傾不是宰官垂護念曇花焉得復重榮召大衆云諸昆仲看看此山形肖鷲峰勢凌霄漢一水拖藍於側群峰俯首於前花吐色香鳥談梵偈巍然高拱北闕卓哉偉壯南黔始闢於先明弘治之年復經於本朝義王之建廣集龍象大結勝因豈意甲寅鋒鏑殿閣頽然雲水蕭條香花淡寂不期我撫軍慕大檀越并闔省文武諸公不忘靈山記莂咸生希有信心金布滿園剎新一色欲令慈風再扇慧日重明喝震洞口之雲棒敲松頂之月可謂曹源復漲覺樹再春然雖若是你諸人還知慕大檀越并文武諸公信心出處麼若知出處何妨一毫端上現寶王剎坐微塵裏轉大法輪脫或未然不免重宣以偈此段因緣非偶然大都種自劫初前祗園今日重彪炳永壯皇圖億萬年下座昊天閣落成開光上堂師以拂子打圓相云諸昆仲見麼此是清淨自然覺皇如來三千二百劫所證之光所謂大神通光大慈悲光大喜捨光大忍辱光大平等光大柔和光大自在光大利益光大如意光大智慧光大吉祥光大解脫光大功德光大皈依光大圓滿光大無礙光無能勝光今日在我開府慕公不思議海中放於棲霞頂上普照三千大千世界於中山河國土動植飛潛凡遇斯光者悉皆當地解脫召大衆云既是清淨自然覺皇如來所證之光因甚又在開府慕公不思議海中放出這裏會得始知人人六根門頭靡不放光動地個個五蘊山中不無吐瑞凌虛又何有聖凡之別迷悟之分敢問大衆開光稱賀一句作麼生道良久云琳宮重建覆金仙盤結紅雲勢自然以筆點一點云十七大光開此日人間天上照無偏佛成道日觀音寺松雲禪人同衆請圓戒上堂不住皇宮入雪山六年苦行太無端明星一點凌空現照得頂𩕳沒半邊拈拄杖召大衆云諸昆仲那裏是迦文老人頂𩕳沒半邊處這裏會得便會大地普觀奇哉三歎以至赤雙足披凍雲下山談空說有拈花枝付正法教人遞代流通到這裏則比丘二百五十戒不具已具菩薩十重四十八輕戒未圓已圓又何須鳴鐘升座析相分條而謂之戒耶倘或未能一年一度逢斯日引得諸人說悟迷圓戒畢下座康熙丁卯年正月十五日開府慕大檀越請就本山結制糧憲慈母傅太夫人營齊請上堂師詣座前震威一喝云喝震雲開獅嶺外以杖擊座云杖敲花吐鳳山前棲霞頂上燈王座信步高登孰敢先顧左右云還見麼策杖便登拈香云這瓣香位尊北闕壽等南山放之則千邦皆治卷之則萬國咸寧爇向爐中端為祝延今上皇帝聖躬萬歲萬歲萬萬歲欽願四海宴而干戈息八方靜而甲馬休次拈云這瓣香義清似水節重如山凝瑞氣以擁一人結祥雲而覆萬姓爇向爐中奉為滿朝文武闔國公卿並及重建本山都憲慕大檀越暨通省當道勳貴伏願當作皇圖柱石恆為佛國金湯再拈云這瓣香冤深河海禍重丘山棒喝叢中一度得人天座上四回拈供養前住普門堂上傳臨濟正宗第三十二世先師靈隱文老人用酬法乳伏願生生誨人無倦世世接物有方斂衣就座維那白椎竟師舉拂子云秪這個若喚作第一義諦顢頇不少不喚作第一義諦錯過太多顧左右云且作麼生是第一義問靉靆祥雲橫谷口繽紛瑞氣結峰頭如何是東山境師云生春石一嶺集鳥樹千株進云群緇雲集法曇殿共和陽春一曲新如何是東山人師云拈杖撐禪月升堂布法雲進云人境已蒙師指示秪如傅太夫人來山營齊供衆還是為純嘏永錫還是為海屋添籌師云一片春風生隴陌無邊花柳綻江濱進云恁麼則一箭落雙鵰也師云幸得上座證明問如何是天命之謂性師云日出峰巒香閣暖風生林壑石門寒進云如何是率性之謂道師云渴飲饑餐情落落冬裘夏葛意翛翛進云如何是修道之謂教師云說偈雲生案談經月滿堂進云一簾春色人皆見獨有吾師見更真師云是峰皆聳翠無鶴不棲松問道本無言為甚說許多絡索因言顯道究竟來原無一字還是說的是不說的是師云桐葉秋風剪杏花春露滋進云和尚切莫向語默裏轉師卓杖云是語是默僧罔措師便打一僧作禮起目顧四方云是處俱不見未審向那裏見師云有見見時非正見僧四方作聽勢云是處俱不聞且道向那裏聞師云不聞聞處是真聞問如何是萬法歸一師云鈴鳴風過處進云一歸何處師云犬吠客來時問十五日已前當轉何法師云梅雪飄香侵丈室進云正當十五日又作麼生師云爐煙結篆出廊楹進云十五日已後如何話會師云鐘鼓堂前如擊動人天座下定交參問法座巍巍人天濟濟和尚以何法利人師云短杖敲開銅嶺月圓音驚起聖泉龍進云如此則黔南衆姓均霑法雨去也師云不勞讚嘆問昔日說法昆水今朝說法黔山未審昔日的是今朝的是師云日月兩輪光宇內進云恁麼則遇緣即宗隨處作主去也師云香花一路擁杖頭乃云昆池遊罷轉黔南掩室棲霞經幾年今日開堂祝聖壽龜毛拂柄又重拈是以龍象交參歌皇風之地厚水雲聚集頌佛日之天高不期我傅太夫人生希有心營殊勝供敦請山僧弘揚此道偉濟人天欲說即心即佛猶是玉蝶穿花零碎錦欲說非心非佛又成金鶯擲柳亂垂絲不免將此龜毛拂柄拈向諸人面前注解一上致令賢愚老少知心源水源共湛貴賤高低識性月山月同輝遂拈拂子召衆云諸昆仲看看這龜毛拂柄一自普門室內得來幾向華王座上拈出能殺活於當機能縱奪於覿面只是觸不得背不得雖則觸背不得卻能放大寶光照諸剎土是故諸佛於此得之談空說有列祖於此得之接物利生聖君於此得之垂衣治化宰輔於此得之福國庇民庶民於此得之起家治業衲僧於此得之演教弘宗按下拂子云龜毛拂柄既有如是光明如是利益因甚又借傅太夫人信心為之點出於此會得不特會拂柄光明一切遍覆便會夫人信心億劫長存到這裏則鳥啼花落無非即心即佛之玄風清雲淡盡是非心非佛之妙明歷歷諸佛分上此段光明不增活潑潑衆生分上此段光明不減正所謂黃頭碧眼難開口白牯狸奴易展眉正恁麼時各各圓成各各具足則且置如何是開堂祝國一句慈風扇處山河固玉版鳴時日月長復舉三聖道我逢人則不出出即便為人興化道我逢人則出出即不為人師云秪如山僧今日高登寶座普集人天且道為人是不為人是於此下得一轉語不惟不觸於三聖亦且不背於興化脫或不能聽取一頌悠悠緑水拖雲淡岌岌青山捧月明但得消閒三昧法橫拈短杖任遊行結椎下座明空曹居士設齊請上堂士問如何是賓中賓師云雲瓢雪笠走風塵士云如何是賓中主師云逢場作戲任歌舞士云如何是主中賓師云堂前撾鼓四方聞士云如何是主中主師云坐斷白雲不出戶問如何是第一玄師云南明水泛釣魚船進云如何是第二玄師云銅峰頂上月孤圓進云如何是第三玄師云石洞橫穿照壁山進云如何是第一要師云升座宜撾鼓進云如何是第二要師云聽法要知音進云如何是第三要師云受齊須捧鉢進云玄要機關雖迥別不出尋常十二時師云只容如是知不許恁麼道乃云三玄三要展個裏之風光四主四賓印劫前之春色當陽如領會不必棒如雨點直下若承當何須喝似雷轟人天眼目憑開佛祖權衡任握顧左右云要識玄要機關麼鳥聲春裏碎要識主賓意旨麼山色雨中多卓拄杖下座師誕日霞章監院請上堂問世尊說法四十九年未曾說著半字且道說的是甚麼法師卓杖一下云會麼進云不會師云不會正好受持問如何是祖祖傳不盡的師云撐天拄地一枝杖進云如此則將作何用師云打雨敲風處處拈問海屋添籌從此始南山層次數偏長蟠桃一粒大如斗信手拈來獻法王遂豎起拳云且道和尚向何處下口師便打進云恁麼則通身慶快師復打問法堂高闢聳東巖瑞草琪花擁壽臺獅子吼時天地動聖凡濟濟盡歸來時如何師云共看香雲結碧嶺同聞法鼓震丹霄進云秪如世尊出摩耶胎指天指地與和尚登寶王座豎拂拈椎是同是別師云風搖楊柳一江緑露潤桃花夾岸紅進云恁麼則世尊眉橫和尚鼻直師云春色一般露騷人幾樣吟僧禮退師拈杖卓一卓云這木上座與山僧同壽從無始來至於今日同行同住同坐同臥同喜同怒同哀同樂秪是窺覷不得思量不得何故稍起思量而墻千尺才涉窺覷白雲萬里諸人還委悉麼若能委悉不特與山僧同則過去莊嚴劫千佛已同現在賢劫千佛亦同未來星宿劫千佛當同乃至西乾四七東土二三居廛力生遁跡道者莫不皆同到這裏原來金剛壽量人人具足個個圓成非南山之可倫非東海之可比正恁麼時有情無情與木上座同壽則且置如何是數不完計不盡的花甲琪枝歲歲逢春發好鳥年年逐暖啼糧憲夫人周氏初度設齊請上堂問一華開敷千葉周匝一佛出現千佛讚揚且置獨踞孤峰頂時如何師云橫按莫邪全正令進云今日周夫人壽誕開無盡藏結殊勝緣如何是因齊慶讚一句師云緑水青山談壽量進云如此則壽山與江山並峙師云碧霞紫霧結星台問今日周夫人母難之期來山營齊供衆莫是求福如東海麼師云移花兼蝶至進云莫是求壽比南山麼師云買石得雲饒進云如此則算數譬喻所不能及師云不須重道破乃云連日上堂講心說性論妙談玄波及大衆立機立境山僧動棒施喝今日上堂心性不講玄妙不談機境不立棒喝不施拈拄杖云單憑這個與周夫人點出不可說不可說智慧海一一流出無量無邊不可說不可說福德門一一含容無量無邊不可說不可說壽命聚一一聚中或現大身或現小身或現男形或現女形凡有所為悉皆顯現諸人還委悉麼若能委悉始知周夫人智慧福德壽命盡未來際不曾增盡未來際不曾減盡未來際不曾生盡未來際不曾滅到這境界則南山萬仞莫能比其高東海千尋莫能喻其廣又何須華封三祝海屋添籌召大衆云如何是周夫人永同金剛不屬杇壞一句宵宵銅鼓峰頭月日日棲霞嶺上雲不變不遷明歷歷亙今亙古鎮長春二月初八日撫軍慕大檀越設齊請上堂拈香云此香無聲無臭不蔓不枝拈起則瑞擁皇圖放下則祥凝佛國爇向爐中奉為巡撫貴州兼理湖北川東等處地方提督軍務都察院右副都御史重建本山大功德主慕大檀越伏願道心共佛日長明智種同金剛永固斂衣就座上首白椎竟問都院以平等心設伊蒲供於中不向佛求不向法求不向僧求未審和尚如何證明師云百花叢裏過片葉不霑身進云如此則一種沒絃琴惟師彈得妙師云幸有知音識短長問牛頭未見四祖時因甚百鳥銜花獻師云富在深山有遠親進云見後為甚不銜花獻師云貧居鬧市無人問進云如此則幾片閒雲歸去後一輪孤月照山川師云不因瑞木空中墜怎得寒梅江上開進云正所謂金從礦裏出玉自石中生師云一般真切意能有幾人知問孔子有云吾道一貫曾子應唯是何旨趣師云半雷從地發無處不春回進云瞿曇拈花飲光微笑如何話會師云杏花含露放粉蝶逐風來進云雖然如是且道儒釋端的在甚麼處師驀頭兩棒問孔子登東山而小魯登泰山而小天下今日和尚東山升座且道得何意旨師云聳聳群峰皆俯首悠悠萬派盡朝宗進云恁麼則不負四衆臨筵鐘鼓震開府營齊龍象臻師云知恩有幾人問露地白牛眠淺草穿雲鐵鷂繞晴空此段消息和尚知否師云不知進云和尚與麼學人不與麼師云一枝短拄杖對柄斷拂子問善財童子五十三參且道參個甚麼師云參汝不會的進云學人擬欲進步不知樓閣門從甚處入師卓杖云向這裏來進云謝師指引師云切忌錯下腳頭問春回大地先天泄是和尚語否師云曾恁麼道來進云且如九十日前這片春光從甚處發師云拄杖頭上進云九十日後又向甚處去也師云拄杖頭上進云正當恁麼時又在何處師云拄杖頭上乃云吐玉碧桃開夾岸拖金細柳拂層臺乘時敲唱陽春曲幸有知音接拍來須是恁麼人方佐恁麼事欲佐恁麼事還他恁麼人方使宗風不墜道眼流通流通且置作麼生是道眼莫是青山緑水麼未免住於色相莫是鶯啼燕語麼未免住於音聲大衆聞見既都不是道眼畢竟在甚麼處這裏見得端的始知我慕大檀越天爵人爵齊修選官選佛兩得說甚麼共打無腔鼓同撐不二門扶破沙盆於今時拋爛冬瓜於那畔露鳶飛魚躍旨趣泄水流風動機緣到這裏則河圖洛書端由莫測妙德空生玄妙罔知三賢啓口無能十地退身有分又何須動棒似雨施喝如雷與麼會去從教佩佛祖靈符如是觀來亦可攜仲尼日月然後現丈六金身於一莖草上不為分外納百億須彌於一粒粟中又有何妨正與麼時如何是慕大檀越互相激揚一句玉板聲傳雲谷外曇花香發仕途中下座諸山禪德營齊請上堂半月濃陰鋪四野一朝杲日麗高亭諸禪潔治酥酡供請我升堂轉法輪拂子揮時古洞孤巖悉皆吐氣杖頭卓處枯松稿竹莫不回春引得鳥語關關清木入之耳底谷風習習暖石女之面門樵人腰斧登危岡野水拖藍投古渡此是諸山禪德同設香飯共結勝因撥去千層障雲露出一輪杲日致令有情無情霑不盡之光輝真諦俗諦樂無為之至化敢問大衆陽回大地則且置未審這段濃陰收向甚處卓杖云但向聲前親薦取休從言下錯商量下座洪邊門一興劉居士率衆檀信營齊請上堂問今日升堂無別問君臣五位請師宣師云逐一問將來進云如何是君師云萬國咸欽仰進云如何是臣師云丹心貫太清進云如何是君視臣師云雖然居九五寶光左右飛進云如何是臣向君師云秉節清寰宇傾心仰聖顏進云如何是君臣合道師云恩深似海乾坤宴義重如山社稷安問昔日釋迦老漢未說法時先拈大乘中乘小乘今日和尚登寶王座還是以小喻中以中喻大師云這是甚麼所在說大說中說小進云因甚又道小根小莖小枝小葉中根中莖中枝中葉大根大莖大枝大葉師云山僧這裏總不恁麼進云何故長者於火宅門外推出三車師卓杖云且道這是那一車進云如是則窮子鼓掌去堂堂信步歸師云腳跟下好與三十棒僧禮拜師乃云連日未升法堂案上塵生一尺層層霧鎖獅山疊疊雲封照壁惹得銅鼓巖皺眉蹙額筆架峰短嘆長嗟偶逢檀信設伊蒲敦請山僧說法要句下澄清五位聲前點破三乘焂忽照壁雲收獅山霧斂銅鼓巖撫掌生歡筆架峰揚眉發笑拈拄杖召大衆云且道證明的是阿誰良久云有意尋思全不見無心晤對甚分明卓拄杖下座寒食道淨桂居士率衆檀信等營齊請上堂問今日清明節哭聲震野雲是何意旨師云總為靈源未透真際未歸進云東山堂上又作麼生施濟師云棒敲山石裂喝震髑髏穿僧作禮師乃云枯林膏雨潤峻嶺鶴雲拖子規啼血染江濱蛺蝶尋芳穿徑岸有者放紙鳶於緑野有者指酒舍於花村有者灑淚荒丘有者燒錢古冢惟有東山了無是事堂前輕敲鐘鼓座上演說無生致令人人三世父母直下透徹靈源箇箇歷劫宗親當陽頓歸真際敢問大衆乘時普濟一句作麼生道禁煙節令屆今朝撾鼓升堂震碧霄一曲無生唱未已三途六趣盡高超卓拄杖下座本師靈隱老人忌日上堂拈拄杖云識先師來處麼卓左邊一下云春來草木含芳識先師去處麼卓右邊一下云秋到峰巒削色還識先師不來而來不去而去處麼卓中間一下云宵宵月朗長空日日風清八極你諸人還委悉麼如其委悉始知先師來無所從去無所至法身克滿十虛法雨灑周三際設或不能酥酡妙供真前列牛首名香鼎內焚以杖三卓下座率衆至影堂拈香上供畢便歸方丈雲南師宗州萬壽庵嗣法門人海聞捐刻本師和尚語録第三卷附藏流通伏願曹源涸而復長覺樹凋而再春康熙戊寅歲季夏月吉旦板藏嘉禾楞嚴經坊
