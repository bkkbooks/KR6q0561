body:
  text: 嗣法門人真解等編示偈冬夜示眾山堂夜靜坐蒲團萬慮咸清覺自然寒月珊珊凌梵闕疏鐘歷歷震雲天半窗雪色侵伽定幾樹梅香噴綺筵了得勝因內外徹應堪撒手續單傳示允章李居士欲出無明千仞淵必須念佛與參禪參禪可破去來相念佛能空生死緣生死緣空風在樹去來相破月橫天古今多少修持輩未有不由二事圓示蒙化眾禪者欲透西來最上乘須從聲色裏邊尋嚴公擊竹明真性靈老觀桃契本心莫謂昔人能荷負應知今者亦堪任昂頭觸碎銀山壁花白開敷鳥自吟滇南復友自入滇南隨寓安了無一事可相千懶拋綸線磯頭釣秪把瑤琴月下彈山寺嬉遊憑自適雲霞亂剪欲誰歡寧教沉沒於江海詎肯遺他作話端雲州復諸儒士釋教儒宗天下傳何分西蜀與南滇欲知月指當空處須識吾無隱爾篇居易親僧因重道長公解玉為逃禪了知彼此非同異文字憑拈入大圓人日勉眾風自生和寒自衰靈辰節令是今期梅花枝上初殘雪楊柳池邊乍吐絲萍跡悠然雖不定禪心卓爾應須知殷勤報爾參玄士惜取韻華趁此時號破雲侍者諱寶月幾片迷雲黑似墨一輪寶月亮如銀迷雲每向月邊繞寶月常從雲裏橫雲破天中心性朗月明劫外水山清但知寶月原無隱莫問迷雲何處生號禪清禪人號性朗五蘊空來因性朗四恩報去為禪清禪清不必窮真際性朗何須問未生若使禪清憑散澹如能性朗任縱橫覺花原自禪清放道果還從性朗成勉謬行棒喝者欲啟吾家棒喝門好將棒喝看分明棒須劈破有無見喝要澄空迷悟情迷悟空時星月朗有無破處水山清棒頭喝下如親切是則名為棒喝人勉妄分儒釋者釋教儒宗沒兩途休將儒釋妄分疏儒宗一貫旨非別釋教單傳致不殊會合唯時儒即釋圓通笑處釋皆儒從來釋道同儒道誰謂儒宗異釋歟示瀛洲禪者爾之具足真常纖毫未曾隱藏耳際圓通鳥語鼻端一貫花香弄箸拈匙盡洩開巾展缽全彰覷破如斯成現不須更覓心王齋榜養得一群泥牛頭角宛然俊俏有時棬裏橫眠有時堂前大叫有時運力而耕有時回光而照告報遐邇檀那代吾添些草料示況瑞麟居士個事甚分明何須我饒舌鳥啼妙理彰花發玄機洩莫謂他英靈休云我下劣古人曾有言是水皆涵月示祥亨善人欲透生死關無分男女相玉從頑石出蓮自淤泥放即此妄明真以斯真破妄曾聞龐道婆火宅空諸障示祥生居士修行莫執相執相遭魔障勦絕聖凡蹤掃除佛祖狀心清慾海枯性靜覺花放若到與麼時方來喫我棒示白絅候身居戎馬場志向如來道箭射去來關刀開生死竅衝鋒露本常破敵彰玄妙會得殺人心頭頭合至要示克弘禪人磊落山林士孤高絕比量松花為飯食荷葉作衣裳靜對三身佛閒薰五分香一般殊勝事誰個肯承當示載空禪者教外別傳宗明明日用中拈匙舒慧辯舉箸洩靈通夜對孤圓月晨聽斷續鐘頭頭無不是奚必問禪翁示卓爾禪者學道趁年青光陰莫可惜梵書對月看禪觀掩關習日中須省三個裏要精一東山無別傳以此通消息送純真禪人還滇見說還滇去十分難割捨詩裁丹桂送淚逐秋雲灑白水景好觀盤江杖穩把有人問若何拈拳驀口打山堂晏坐山堂晏坐一爐香萬慮咸清白晝長問到心宗無別示惟拈拂子擊禪床木魚頌昔日爭先躍禹門而今哮吼在禪林秪因不借煙波力惹得桃花逐浪尋聞雨示眾夜靜跏趺小閣東雷聲歷歷震雲空春霖也解饒長舌說破虛靈那一通示空藏禪人尋常日用勿顢頇好把工夫個裏圓薦取禪心明似月放光動地照人天示自惺禪者莫馳南北與西東慧劍單提日用中六處迷雲齊掃盡頂門獨露一輪紅示秋雲禪者日用尋常須策鞭莫教荊棘長心田山僧記得先賢誡心若堅時鐵也穿慈念禪人求偈還滇勵志還鄉乞我言我言非是等閒傳直教伸出回天手摝起昆池月一圓侍僧請題木魚口占胡不成龍上碧天終年於此傍經眠零敲碎打知多少不解飛騰亦枉然值雪示眾六出霏霏庭際飄平湖冰結似瓊瑤安心旨趣如能透木佛何妨信手燒示不夜謝居士本來面目問阿誰歷歷明明須自知深夜一輪空界月清光何處不同窺張文憲持扇求偈面自白兮骨自黑其中句子作麼說試將黑白未分時頓起疑情決一決示本光任居士本光一點最靈通破暗除昏迥不同今日山僧親揭示亙今亙古耀無窮示淨明胡居士從茲切忌走多途六字彌陀莫放輸念到心安意肯處一枝白藕發紅爐示周汝和披風踏雪禮梅溪試問梅溪有甚的自倒應須還自起大都此事貴親知壽清修熊居士人人都以九如祝惟有山僧祝不同只要頂𩕳開正眼彌天彌地壽無窮月濤山示眾孰謂濤山景不清數株古木一堆雲鳥聲未絕濤聲起縱是石頭亦解聞寓萬壽寺諸檀送燈求偈罷釣歸來宿上方月光夜夜照虛堂諸公為愛月光淨故放燈光伴月光贈盤龍潛靈法姪憶昔旅亭良晤時烹茗話月已投機而今一杖盤龍頂無限風雲得所依示湛明禪人日暖風和鳥弄聲低紅淺碧點山楹果然悟得色空理何慮襟懷不湛明示桃林陳居士三月桃花綻滿園靈雲一見破愁顏而今說與桃林士見得分明沒兩般示竹林陳居士幾竿翠竹倚牆根擊著之時便有聲分付竹林珍重好香巖從此悟心明示雲騰雷秀才如來鼻孔下頭大夫子眉毛八字橫會得這些不別處方知一貫即無生示續燈禪者工夫日用莫因循剔起無油一盞燈只待燈花開劫外昏衢爍破照禪心示雷聖望修行卻是青年好力自壯兮氣自飽剔起蒼蒼兩道眉銀山鐵壁盡推倒示段子潔學道何妨年紀老年老般般歷過了只此老成一片心古岸不愁踏不到示芳遠禪孫隨師伴友住南山日用尋常休放閒風動水流能惺覺何難掉臂那重關示吳爾新昨宵寫偈贈諸檀不覺忘了伊一篇今日仍從忘處寫寫來字字合從前示陳大廷相逢玉閣宛如舊意自投而機自扣笑我傳伊非別傳仍教薦取無聲臭贈劉鎮臺諱芝林鵲印數搖邊月靜龍旗頻掣海雲開剛纔解玉歸林下又聽重頒紫詔來春日賀鄭副臺再鎮陽瓜諱彪鶯囀喬林山戴花重張威令鎮陽瓜柳營莫謂春寒甚自有錦袍指日加示本宗芶居士參誰字欲明教外別傳宗個裏工夫莫放鬆參得趙州誰字透三千七百盡皆同夜坐示眾案頭頻剪龍潭燭盞內多傾趙老茶公案重重評不盡又添明月上窗紗示六明善人昔年曾問先師道今日重參梅老禪大似吹毛三尺劍一番過火一番鮮示化池善人修竹勿論智和愚只貴精勤十二時辦得此心成一片火坑自是化蓮池復禪人霜月照禪心原韻雨餘風靜掩柴門七尺單前好息心突出凌霜一片月洗清禪浪幾千尋春日示眾陽春遍布天何言無限化機展目前會得千紅闕碧紫方知一以貫通焉示正白禪人茅屋三間綠水西荷衣松飯趣偏奇時來趺坐蒲團上聽得幽禽窗外啼登雞山光非水面與山阿未審諸人會也麼設使光從山水覓無山無水又如何示石鐘寺懷中禪人獅子林中松色寒猢猻梯上石頭尖等閒煉就驚人句對客何妨信手拈示淨明尼辭親割愛不非輕早晚工夫須自勤坐破迷雲心月皎十方界放淨光明示體虛禪者薙髮染衣業有年曾無半點俗緣牽一從廣佛棲禪後常有雲來代掩關示載空禪者妙年剃染此門中悲願弘深自不同果爾襟懷開闊大何難裝載太虛空示了凡禪者削髮為僧須了凡凡情了卻意悠然年來結屋龍潭上種得冰輪似鏡圓示妙宗居士心水常將盥掌中性香每把拈爐內一聲佛續一聲聲五蘊高山自粉碎示祥普善人暫拋火宅覓清涼來扣圓通大道場兩字法名親記莂任教苦海作慈航示晦心馬居士花明翠竹真如面月朗風清淨土天學佛若開如是眼西方即在個中圓示張夢蘭夜靜樓臺皆得月夏來池沼盡開蓮山僧無法與人說直指西方在目前示本真馬居士學道何妨火宅家舉杯動箸即生涯須知自性如如佛妻笑兒啼不礙他壽徐縣尉籌添海屋是今朝龜步庭前鶴舞霄堪笑道人無可祝拳頭拈起作蟠桃燦融禪人求偈嗣慧月出類英姿不等閒山邊水際已多年而今得繼曹溪脈應好乘時自策鞭登棲鶴樓上層日麗鳥啼春正幽攜僧信步陟層樓忽然上到最高處萬里風光一筆收遊新庵次韻勉主僧卜得蔬園闢草庵野雲孤鶴互交探閒中應把清幽惜莫負溪聲講法曇祗林靜悄搆柴庵旨趣分明奚用探水石煙花皆是佛不須他處覓瞿曇示冰月禪孫蒲團竹椅最相應掩室跏趺慮自澄坐到風恬雲靜處當窗月湧一團冰示自圓李善人大道從來沒兩途那論裙釵與丈夫試看皎明深夜月萬派千江何處無寄雲如劉副戎開士禪心圓似月將軍寶劍白如霜了知個裏非同異虎帳憑教作道場寄數珠與劉夫人一自皈依不二門個中精進已年深寄來百八菩提子印證夫人奉佛心號鐵航禪人底事從來不覆藏拈香撥火露堂堂如能劈面承當去一任波心駕鐵航示嘯竹侍者室掩棲霞最上層松聲吟罷鳥聲吟只須聞到無聞處撒手從教嘯竹林書扇送別慈修禪者兩月盤桓尚未周不期歸去意還悠有人問到棲霞事信手還他一扇頭壽覺悟耆宿覺了生前悟已明又從雲外闢金鳴勝因無限籌難紀翻覆數來數不清壽慧穎西堂一粒金剛子最圓也知種在劫雲邊年年七月逢斯日燦爛光明照遠天寓金鳴題桂示眾寄跡金鳴秋正回園林一夜木犀開禪流欲識吾無隱薦取天香撲鼻來示一拳桂居士禪期解罷下東山遯跡金鳴擬學閒孰料依然閒不得拳頭為爾復重拈示古鏡霍居士一句話頭說與知精勤檢點莫教遲雖然古鏡光明有也要揩模十二時示空蘊曹善人居諸來去如馳驛個事勤參莫放逸識得持家非別人何愁五蘊不空寂示明懷善人八十餘年教子孫子孫事業已完成雖然撒手歸三寶要識其中不老人示輝之善人年將九十慕修行不必從他別問津一句彌陀作拄杖千尋彼岸任從登示培道善人操家七十有餘年今日回心歸大道六八願王勤持蓮池九品不難到示北海張居士而今欲透未生前打起精神莫放閒驀地疑團輕撲碎何難掉臂那重關示成之朱居士金刀舉起真機露玉尺拈時生面開會得這些親切意一針針是一如來壽鵬舉高居士聞道懸弧此日間愧無一物慶南山聊將劫外秪園果代作冰桃信手拈示定生戒子三衣一缽體中玄早晚參持莫教閒欲得戒光隨處放直須透過這重關贈于野黃居士勿論禪門與道儒直須扣己做工夫三家會合原歸一字姓何妨上祖圖示六和戒子舍那戒法不尋常曾發先賢性地香今日東山拈向汝一層光燦一層光示仁和戒子戒壇雖爾萬尋高破霧乘風莫憚勞若欲躋攀無上品最初一步要堅牢示大徹禪孫趁此青年勿放過吹毛寶劍急須磨直教磨得如風利殺活臨時莫放他示缽蓮禪孫自小歸根到我家而今已得著袈裟工夫早晚莫輕忽奪取瞿曇示眾花示林秀禪人撒手空門氣岸豪塵衣脫卻挂方袍而今若欲林增秀須借禪天法雨澆中秋茶餅寄祿藜和尚一枚餅子圓如鏡幾片山茶碎剪春趙老雲門藏不得和盤托向月中人贈長瑞劉夫人一曲哩囉唱有年幾回震徹劫初前相傳應是知音者不是知音詎肯傳復無相居士來韻遯跡東林那計年每逢佳客賦禪篇雖然此道無新舊幾個能知不變遷半間竹榻倚雲眠花自耘耡籬自編有問西來鼻祖意棒頭血濺染青天既爾江南曾遍參何妨在處樂悠然倘君不吝青雲步直上東山話夙緣壽赤松和尚闢得黔靈逼太空層山曲水盡依從弧懸此日花飛雨一座當軒繞象龍夏日送葉都閫陞任江南年餘美政冠黔天萬姓謳歌樂且便剛欲與君談底事榴花報任轉江南贈瑞彩周居士修行不在除葷酒秪貴當人信向真設使長齋纔了道蘇黃何以載傳燈壽周孺人八十不萌枝上果芬香顆顆拈來帶雪霜經歷韶華非八十同天同地結春長送瑞彩周居士之中州年餘叨護白雲窩些子無酬感愧多信手劈開東嶺月分君一半去滹沱送別彥士陳居士客歲相逢不盡歡今朝判袂十分難贈君一本棲霞錄攜去河南早晚看送別君選胡居士囊藏犀扇已年深頭角分明最有情聞道中州天氣熱贈君握去引風清送明空曹居士禮南海一架蒲團一緉鞋名山勝蹟踏春開欲窮南海真消息試聽潮音吼似雷示一源行者侍師遊南海峨嵋雞足已遊週今又侍師南海遊雖歷重重山與水可知萬派一源收示自照蔡善人家業豐隆大矣子孫繁衍優哉既然事事備足應須識取本來示湛目善人大道不分男女只貴當機薦取會得釵鐶即金修行事業備矣示清波善人修行要訪明師切莫依附盲者曾聞先哲嘉言近朱自是赤也示眾斷除妄想皆非趣向真如是病但得一念不坐活機處處圓應如是迎賓待客與麼喫飯穿衣欲識本來面目窗前試聽鶯啼成仙成佛虛名應馬應牛活計若能辦得此心縱不修持亦是檻外池涵月皎窗前竹掃風清個事分明漏洩不須別處參尋欲表僧中丈夫須效當年老盧焂忽花生碓觜始知一物原無示廣相張居士你的鼻孔遼天我的腳跟點地明明本自現成何必山僧授記示懷智禪人柳綠花紅妙相鶯啼燕語真宗若從他處尋覓依然錯過圓通示戴居易纔聽新蟬語樹又看白雪凌空怎似無陰陽地長年花綻枝紅示省幻段居士不期相晤鎮西向我攝心斂意既然省幻其中要識西來旨趣示巨修善人佛法個個不無何須向我問取提針舉剪歷然悟來無不是矣示默可善人迷時有修有證悟處無人無我欲透此個機關坐臥經行默可示覺天萬居士戎馬場中住腳香雲地上留心既有如斯信向覺天自是高登示空藏禪人禪觀精勤究梵章仔細看工夫成一片繼祖又何難示自曉蔡居士惡從心上發善自性中生善惡不思議菩提當下威示月湛王居士欲窮本有道工夫莫放過忽然心性徹一月湛清波示衣雲禪孫少小別雙親吾門好用心一朝參學辦任撫沒絃琴經壇傳公子請延生偈魚敲風裡韻磬響劫前音摘朵曇花贈錦堂百億春示開極禪者本來真面目無處不分明秋到雲天澹春來隴陌青示楊善人苦海無邊際長年漲慾波回頭即是岸不必問如何聯芳付慧穎慶緒禪人一喝如雷吼法堂回天轉地不尋常與麼付柄龜毛拂隨處高登曲彔床付石林道輝禪人不負靈山曾有約於今特地始相投遼天拄杖親分付直攪魚龍莫教休付霞章海偉禪人侍我巾瓶三十年同甘苦樂志猶堅無生妙旨今朝付任爾流通紹祖先付紹南真解禪人一條白棒氣如王拄地撐天世莫雙今日當堂親授受大千無處不歸降付繼爾性堅禪人吾家一架沒絃琴遞代相傳彈到今非是等閒分付汝憑教四海接知音付正音海聞禪人十六年來不憚勞而今雖老志猶高師陽此去無他囑一脈流通在爾曹付大霖澄準禪人楚江放出個金鼇躍入紫池氣岸高今日東山與一棒興雲佈雨上青霄付法雨照潤禪人三尺吹毛膽氣昂匣中晝夜吐清光而今贈與英靈士殺活全提始自強付禪睦寂和禪人佛法而今不可模源流拂子塞溝渠闍黎既有超群志好把吾宗極力扶付溪舌寂宣禪人自從東嶺扣機緣抱志勻陽業有年拂柄今朝親付託中興祖道利人天行由壬寅春師住蓬萊永興禪院一日水月禪人率眾入方丈請師行由師曰予之醜惡甚不堪言月曰也要聞於大眾師曰予乃西蜀永川張氏子母吳氏命賦丁丑正月三十寅時自幼惟好恬靜不喜繁華年五歲父攜入黔讀四書未周偶遭世變九歲失怙學業盡拋年十六患病月餘危劇瀕死自念無常迅速不與人期若獲病愈定為剃染是夜三更夢立於片石之上四維俱是墻壁無有出路怕怖慞惶忽聽外面一人叫曰向這裏來俄而左壁崩倒予踴身出惺來通身汗流病減大半天明以出家之志白母母即許可復經月餘病即全瘥遂禮東山知如師薙髮年十九雲遊於滇途中遇一老宿授以生從何來死從何去話自此朝夕窮究未嘗間離年二十求受十戒於闊浪大師二十一參本師於滇城師喜予樸素每以青眼視之一日閱楞嚴經至第四卷富樓那問世尊清淨本然云何忽生山河大地文中恍有入處遂呈偈於師曰生從何來死從何去清淨本然山河大地本師叱之厥後侍師往新興雲集寺值臘八即師座下頓圓大戒命以維那一日師坐法堂予問生從何來師豎拂子予曰死從何去師亦豎拂子予當下冰釋了無疑滯乃呈頌曰生來死去問吾師覿面相酬活潑機怪語奇言都不用秪將玉麈縱橫揮一日侍師圍爐次師顧而問曰生從何來予曰春到花開師曰死從何去予曰秋來葉落師曰即此便好呈頌予口占曰鼻自直兮眼自橫有何死也有何生春來花放秋凋葉歷歷明明不費尋師頷之次日書住山法語贈予曰驅耕夫之牛奪饑人之食趯翻大海水拳倒須彌盧生擒虎兕活捉獰龍猶未是衲僧本分而今要具頂門正眼方纔作家山僧寓棋州即新興州西山始識梅溪禪人有超群越眾之形呵佛罵祖之志山僧權付法語指住山頭保養聖胎他日有末後句子與汝道破囑囑己亥春辭師旋黔居東山一載庚子冬同友照面山結茅辛丑冬本師抵黔之竇堡觀音寺結制差雲嶔持書接予赴堂仍命維那一日命作牧牛頌予信筆成十章師看畢贈以偈曰大器大根連大葉撐天拄地豈尋常而今果熟馨香布邊界山河不覆藏一日挂牌入室予進師舉臨濟示眾曰一句語須具三玄門一玄門須具三要有權有用如何是第一玄予曰明月常遊緣水間師曰如何是第二玄予曰清風每對白雲談師曰如何是第三玄予曰梅花獨放季冬天師曰如何是第一要予曰瞿曇指上花含笑師曰如何是第二要予曰少林門首雪齊腰師曰如何是第三要予曰德山棒下孤光皎師曰三玄三要且置你向甚處見臨濟予便喝師便打予復喝師復打予拂袖而出即呈頌曰三玄三要濟北門庭隨方殺活在處縱擒雷轟電掃乾坤動浪湧波騰海嶽昏棒頭落處兮星明月朗喝聲起處兮水綠山青值佛成道日師撰曹溪正脈來源并聯芳偈師兒哮吼震乾坤一喝鋒鋩海水渾今日老僧親囑付栴檀林裏報吾恩付予予再四卻之師曰古人有言智過於師方堪傳授難道老僧不識爾耶予不得已即受之這般醜惡從來未舉向人今不負爾誠懇只得盡情吐露未免塗污諸方耳也水月率眾一齊作禮而退戒子寂貴寂本寂德普聯真修海湛德生寂聆明本真能祥超祥廣祥勝祥功捐刻本堂老和尚語錄第十卷附藏流通伏願戒光照穢邦淨土甘露潤枯槁群萌康熙戊寅歲季夏月吉旦板藏嘉禾楞嚴經坊嘉興夏維寧張書瞻寫刻
